kind = "web"
previewPath = "/"
title = "Sports Shield"
version = "1.0.0"
id = "artifacts/sports-shield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22483

[services.development]
run = "pnpm --filter @workspace/sports-shield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sports-shield", "run", "build" ]
publicDir = "artifacts/sports-shield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22483"
BASE_PATH = "/"
