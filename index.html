<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sports Shield</title>
  </head>
  <body>
  <div id="root"></div>
<script type="text/babel"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  function App() {
  const [view, setView] = React.useState('Overview');
  const [violations, setViolations] = React.useState(351);

  return (
    <div style={{ display: 'flex', backgroundColor: '#000033', color: 'white', minHeight: '100vh', fontFamily: 'sans-serif' }}>
      
      {/* 1. SIDEBAR */}
      <div style={{ width: '200px', borderRight: '1px solid #444', padding: '20px' }}>
        <h2 style={{ color: 'cyan' }}>Sports Shield</h2>
        <p onClick={() => setView('Overview')} style={{ cursor: 'pointer', color: view === 'Overview' ? 'cyan' : 'white', fontWeight: view === 'Overview' ? 'bold' : 'normal' }}>• Overview</p>
        <p onClick={() => setView('Scanner')} style={{ cursor: 'pointer', color: view === 'Scanner' ? 'cyan' : 'white', fontWeight: view === 'Scanner' ? 'bold' : 'normal' }}>• Scanner</p>
        <p onClick={() => setView('Tracking')} style={{ cursor: 'pointer', color: view === 'Tracking' ? 'cyan' : 'white', fontWeight: view === 'Tracking' ? 'bold' : 'normal' }}>• Tracking</p>
      </div>

      {/* 2. MAIN CONTENT AREA */}
      <div style={{ flex: 1, padding: '40px' }}>
        
        {view === 'Overview' && (
          <div>
            <h1>Global Piracy Overview</h1>
            <p style={{ color: '#aaa' }}>Real-time tracking of unauthorized sports media broadcasts</p>
            <div style={{ padding: '20px', border: '1px solid cyan', borderRadius: '12px', width: '250px', marginTop: '20px' }}>
              <h3 style={{ fontSize: '14px', margin: 0 }}>VIOLATIONS DETECTED</h3>
              <h2 style={{ color: '#ff4444', fontSize: '48px', margin: '10px 0' }}>{violations}</h2>
            </div>
          </div>
        )}

        {view === 'Scanner' && (
          <div>
            <h1>AI Network Scanner</h1>
            <p style={{ color: '#00ff00' }}>● System Active: Scanning global streams...</p>
            <div style={{ background: 'rgba(255,255,255,0.05)', padding: '20px', borderRadius: '8px', marginTop: '20px' }}>
               <p style={{ color: 'cyan' }}>[09:58] Analyzing YouTube Live Feed...</p>
               <p style={{ color: '#ff4444' }}>[09:59] FLAG: Unauthorized broadcast on "live-sports-free.xyz"</p>
            </div>
          </div>
        )}

        {view === 'Tracking' && (
          <div>
            <h1>Asset Tracking</h1>
            <p>Digital fingerprinting status for official feeds.</p>
            <div style={{ marginTop: '20px', padding: '15px', border: '1px dashed #555' }}>
               <p>✓ Forensic Watermark active for Premier League Feed</p>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
  </body>
</html>
