<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Anti-Piracy Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050510; color: #cbd5e1; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050510; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        @keyframes scan-move {
            0% { transform: translateY(-10px); }
            100% { transform: translateY(400px); }
        }
        .scanning-line { position: relative; overflow: hidden; }
        .scanning-line::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: #3b82f6; box-shadow: 0 0 15px #3b82f6;
            animation: scan-move 2s linear infinite;
        }
    </style>
</head>
<body class="text-[13px] selection:bg-blue-500/30 overflow-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SidebarItem = ({ id, icon, label, active, onClick }) => (
            <button 
                onClick={() => onClick(id)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 group ${
                    active ? 'bg-blue-600/10 text-white border border-blue-500/20 shadow-[0_0_15px_rgba(59,130,246,0.1)]' : 'text-slate-500 hover:text-slate-200 hover:bg-slate-800/40'
                }`}
            >
                <i data-lucide={icon} className={`w-[18px] h-[18px] ${active ? 'text-blue-500' : 'group-hover:text-blue-400'}`}></i>
                <span className="font-semibold tracking-tight">{label}</span>
            </button>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('Overview');
            const [scanStatus, setScanStatus] = useState('idle'); 
            const [scanUrl, setScanUrl] = useState('youtube.com/live/match-hd-720p');
            const [scanStage, setScanStage] = useState(0);
            const [showReport, setShowReport] = useState(false);
            const chartInstances = useRef({});

            const stages = [
                { id: 1, label: "Resolving target endpoint", sub: "Endpoint resolved • 3 hops" },
                { id: 2, label: "Probing media stream signature", sub: "H.264 1080p • 60fps • 6 Mbps" },
                { id: 3, label: "Comparing against fingerprint vault", sub: "Match: UEFA Champions League Final" },
                { id: 4, label: "Geo-tagging viewer cluster", sub: "Cluster: South Asia • 47.2K concurrent" },
                { id: 5, label: "Computing risk score", sub: "Confidence 0.94" }
            ];

            useEffect(() => {
                window.lucide.createIcons();
                if (activeTab === 'Overview') renderOverviewChart();
            }, [activeTab, scanStatus, scanStage, showReport]);

            const renderOverviewChart = () => {
                const ctx = document.getElementById('trafficChart');
                if (ctx) {
                    if (chartInstances.current.main) chartInstances.current.main.destroy();
                    chartInstances.current.main = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['08:10', '10:10', '12:10', '14:10', '16:10', '18:10', '20:10', '22:10'],
                            datasets: [{
                                data: [120, 95, 70, 50, 45, 60, 40, 75],
                                borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.05)', fill: true, tension: 0.4, pointRadius: 0
                            }]
                        },
                        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 10 } } }, y: { display: false } } }
                    });
                }
            };

            const startScan = () => {
                setScanStatus('scanning');
                setScanStage(0);
                stages.forEach((_, i) => {
                    setTimeout(() => setScanStage(i + 1), (i + 1) * 600);
                });
                setTimeout(() => setScanStatus('result'), stages.length * 700);
            };

            return (
                <div className="flex h-screen w-full bg-[#050510]">
                    {/* MODAL REPORT */}
                    {showReport && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-6 animate-in fade-in duration-300">
                            <div className="bg-[#0a0a1f] border border-blue-500/30 p-10 rounded-3xl max-w-lg w-full shadow-[0_0_50px_rgba(59,130,246,0.2)]">
                                <div className="flex justify-between items-start mb-8">
                                    <div>
                                        <h3 className="text-xl font-black text-white uppercase tracking-tighter">AI Diagnostic Report</h3>
                                        <p className="text-[10px] text-blue-500 font-bold uppercase mt-1">Status: Operational</p>
                                    </div>
                                    <button onClick={() => setShowReport(false)} className="text-slate-500 hover:text-white transition-colors">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <div className="space-y-4 font-mono text-[11px]">
                                    <div className="flex justify-between py-3 border-b border-slate-800/50"><span className="text-slate-500">Processing Nodes</span><span className="text-white">Active (14)</span></div>
                                    <div className="flex justify-between py-3 border-b border-slate-800/50"><span className="text-slate-500">Neural Sync Speed</span><span className="text-blue-400">8.4ms</span></div>
                                    <div className="flex justify-between py-3 border-b border-slate-800/50"><span className="text-slate-500">False Positive Rate</span><span className="text-blue-400">0.02%</span></div>
                                    <div className="flex justify-between py-3 border-b border-slate-800/50"><span className="text-slate-500">Encrypted Throughput</span><span className="text-white">1.2 GB/s</span></div>
                                </div>
                                <button onClick={() => setShowReport(false)} className="w-full mt-10 py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-xl text-[10px] uppercase tracking-widest transition-all">Close Diagnostic</button>
                            </div>
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <aside className="w-[240px] bg-[#03030b] border-r border-slate-800/60 p-5 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 text-blue-500 mb-10 px-2">
                            <i data-lucide="shield" className="w-7 h-7 fill-blue-500/20"></i>
                            <h1 className="text-lg font-black text-white tracking-tighter uppercase">Sports Shield</h1>
                        </div>
                        <nav className="flex-1 space-y-1">
                            <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 px-3 mb-3 font-mono">Mission Center</p>
                            {[
                                { id: 'Overview', icon: 'activity' },
                                { id: 'Scanner', icon: 'search' },
                                { id: 'Apps', icon: 'layers' },
                                { id: 'Predictions', icon: 'trending-up' },
                                { id: 'Tracking', icon: 'map' },
                                { id: 'Assets', icon: 'lock' },
                                { id: 'Enforcement', icon: 'gavel' },
                                { id: 'Settings', icon: 'settings' }
                            ].map(item => (
                                <SidebarItem key={item.id} id={item.id} icon={item.icon} label={item.id} active={activeTab === item.id} onClick={setActiveTab} />
                            ))}
                        </nav>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-10">
                        
                        {/* OVERVIEW */}
                        {activeTab === 'Overview' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white tracking-tight">Operations Overview</h2>
                                <p className="text-slate-500 text-sm mt-1 mb-8">Real-time piracy intelligence and global enforcement metrics.</p>
                                
                                <div className="grid grid-cols-6 gap-3 mb-8">
                                    {[
                                        { l: 'Active Incidents', v: '11', c: '+12%', i: 'activity', clr: 'text-red-500' },
                                        { l: 'Viewers Blocked', v: '285,400', c: '+5%', i: 'eye-off', clr: 'text-blue-400' },
                                        { l: 'Takedowns', v: '5', c: '+2%', i: 'gavel', clr: 'text-blue-500' },
                                        { l: 'Assets', v: '8', c: '0%', i: 'lock', clr: 'text-blue-600' },
                                        { l: 'Revenue', v: '$4.82M', c: '+18%', i: 'dollar-sign', clr: 'text-emerald-500' },
                                        { l: 'Avg Time', v: '47s', c: '-1s', i: 'clock', clr: 'text-orange-500' }
                                    ].map((s, idx) => (
                                        <div key={idx} className="bg-[#0a0a1f] border border-slate-800 p-4 rounded-xl">
                                            <div className="flex justify-between items-start mb-2">
                                                <i data-lucide={s.i} className={`w-3.5 h-3.5 ${s.clr}`}></i>
                                                <span className="text-[9px] font-black text-blue-400">{s.c}</span>
                                            </div>
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter mb-1">{s.l}</p>
                                            <p className="text-lg font-black text-white leading-none">{s.v}</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-3 gap-6">
                                    <div className="col-span-2 bg-[#0a0a1f] border border-slate-800 p-6 rounded-2xl h-[300px]">
                                        <h4 className="text-xs font-bold text-white mb-6 uppercase tracking-widest">24h Traffic Impact</h4>
                                        <div className="h-[200px]"><canvas id="trafficChart"></canvas></div>
                                    </div>
                                    <div 
                                        onClick={() => setShowReport(true)}
                                        className="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-2xl flex flex-col justify-between cursor-pointer hover:scale-[1.02] transition-all group relative overflow-hidden"
                                    >
                                        <div className="absolute top-0 right-0 p-4 opacity-20"><i data-lucide="cpu" className="w-12 h-12"></i></div>
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-6">AI Efficiency</p>
                                            <p className="text-5xl font-black text-white group-hover:drop-shadow-[0_0_15px_rgba(255,255,255,0.4)] transition-all">94%</p>
                                            <p className="text-xs mt-4 opacity-80 leading-relaxed font-medium">Optimization across all digital assets via automated fingerprinting.</p>
                                        </div>
                                        <button className="w-full py-3 bg-white/10 hover:bg-white/20 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/20 transition-colors">
                                            Open System Report
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SCANNER */}
                        {activeTab === 'Scanner' && (
                            <div className="max-w-4xl mx-auto animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white mb-8 tracking-tight">Stream Scanner</h2>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-10 mb-6">
                                    <div className="flex gap-3 mb-4">
                                        <input type="text" value={scanUrl} onChange={(e)=>setScanUrl(e.target.value)} className="flex-1 bg-[#050510] border border-slate-800 rounded-xl px-5 py-4 text-blue-400 font-mono text-sm focus:outline-none" />
                                        <button onClick={startScan} className="bg-blue-600 hover:bg-blue-500 text-white font-black px-10 rounded-xl text-xs uppercase tracking-widest">Run Scan</button>
                                    </div>
                                </div>
                                {scanStatus === 'scanning' && (
                                    <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-10 space-y-6 scanning-line">
                                        {stages.map((stage, idx) => (
                                            <div key={stage.id} className={`flex gap-4 items-start transition-all duration-500 ${scanStage > idx ? 'opacity-100 translate-x-0' : 'opacity-20 -translate-x-2'}`}>
                                                <i data-lucide={scanStage > idx ? "check-circle" : "circle"} className={`w-4 h-4 mt-1 ${scanStage > idx ? 'text-blue-500' : 'text-slate-600'}`}></i>
                                                <div><p className="text-[13px] font-bold text-white">{stage.label}</p><p className="text-[11px] text-slate-500 font-mono">{stage.sub}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {scanStatus === 'result' && (
                                    <div className="bg-[#0a0a1f] border border-red-500/30 rounded-2xl p-10 animate-in zoom-in-95 duration-300">
                                        <div className="flex justify-between items-center mb-8 pb-6 border-b border-slate-800/50">
                                            <p className="text-xs font-bold text-slate-500 uppercase">Analysis: <span className="text-red-500 ml-2">Piracy Confirmed</span></p>
                                            <p className="text-2xl font-black text-white">96% <span className="text-[10px] text-red-500 uppercase">Risk</span></p>
                                        </div>
                                        <button className="w-full py-4 bg-red-600 text-white font-black rounded-xl text-[10px] uppercase tracking-widest hover:bg-red-500">Initiate Takedown</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* PREDICTIONS */}
                        {activeTab === 'Predictions' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white mb-8 tracking-tight">Predictive Intelligence</h2>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl overflow-hidden">
                                    <table className="w-full text-left text-[12px]">
                                        <thead className="bg-[#050510] border-b border-slate-800 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                                            <tr><th className="px-6 py-5">Event</th><th className="px-6 py-5">League</th><th className="px-6 py-5">Est. Piracy</th><th className="px-6 py-5 text-right">Risk</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/40">
                                            {[
                                                { m: 'Manchester United vs Liverpool', l: 'Premier League', p: '1.2M+', r: 'Critical' },
                                                { m: 'Real Madrid vs Barcelona', l: 'La Liga', p: '2.1M+', r: 'Critical' },
                                                { m: 'Lakers vs Celtics', l: 'NBA', p: '640k+', r: 'High' }
                                            ].map((ev, i) => (
                                                <tr key={i} className="hover:bg-slate-800/20 transition-all">
                                                    <td className="px-6 py-5 font-bold text-white">{ev.m}</td>
                                                    <td className="px-6 py-5 text-slate-500">{ev.l}</td>
                                                    <td className="px-6 py-5 text-red-500 font-bold">{ev.p}</td>
                                                    <td className="px-6 py-5 text-right"><span className="bg-red-500 text-white px-2 py-0.5 rounded text-[8px] font-black uppercase">{ev.r}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* TRACKING / ASSETS / ENFORCEMENT PLACEHOLDERS */}
                        {['Tracking', 'Assets', 'Enforcement'].includes(activeTab) && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white mb-8 tracking-tight">{activeTab} Console</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-[#0a0a1f] border border-slate-800 p-8 rounded-3xl min-h-[300px] flex flex-col justify-center items-center opacity-40">
                                        <i data-lucide="shield-alert" className="w-12 h-12 mb-4"></i>
                                        <p className="text-sm font-bold uppercase tracking-widest">Awaiting Live Feed</p>
                                    </div>
                                    <div className="bg-[#0a0a1f] border border-slate-800 p-8 rounded-3xl min-h-[300px] flex flex-col justify-center items-center opacity-40">
                                        <i data-lucide="database" className="w-12 h-12 mb-4"></i>
                                        <p className="text-sm font-bold uppercase tracking-widest">Metadata Syncing...</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SETTINGS */}
                        {activeTab === 'Settings' && (
                            <div className="animate-in fade-in duration-500 max-w-2xl">
                                <h2 className="text-2xl font-extrabold text-white mb-8 tracking-tight">System Settings</h2>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-8 space-y-6">
                                    <div className="flex items-center justify-between p-5 bg-[#050510] rounded-xl border border-slate-800/50">
                                        <div><p className="text-white font-bold text-xs">Automated Takedowns</p><p className="text-[10px] text-slate-600 mt-1">Send DMCA instantly on 95%+ match.</p></div>
                                        <div className="w-8 h-4 bg-blue-600 rounded-full relative"><div className="absolute right-1 top-1 w-2 h-2 bg-white rounded-full"></div></div>
                                    </div>
                                    <div className="p-5 bg-[#050510] rounded-xl border border-slate-800/50">
                                        <p className="text-[10px] font-bold text-slate-500 uppercase mb-2">API Webhook</p>
                                        <p className="text-blue-400 font-mono text-xs">https://api.sportsshield.io/v1/hook_3841</p>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
