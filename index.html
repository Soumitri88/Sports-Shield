<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050510; color: #cbd5e1; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050510; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="text-[13px] selection:bg-blue-500/30 overflow-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SidebarItem = ({ id, icon, label, active, onClick }) => (
            <button 
                onClick={() => onClick(id)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 group ${
                    active ? 'bg-blue-600/10 text-white border border-blue-500/20 shadow-[0_0_15px_rgba(59,130,246,0.1)]' : 'text-slate-500 hover:text-slate-200 hover:bg-slate-800/40'
                }`}
            >
                <i data-lucide={icon} className={`w-[18px] h-[18px] ${active ? 'text-blue-500' : 'group-hover:text-blue-400'}`}></i>
                <span className="font-semibold tracking-tight">{label}</span>
            </button>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('Overview');
            const [scanStatus, setScanStatus] = useState('idle'); 
            const [scanUrl, setScanUrl] = useState('youtube.com/live/laliga-hd-stream-es');
            const [scanStage, setScanStage] = useState(0);
            
            const stages = [
                { id: 1, label: "Resolving target endpoint", sub: "Endpoint resolved • 3 hops" },
                { id: 2, label: "Probing media stream signature", sub: "H.264 1080p • 60fps • 6 Mbps" },
                { id: 3, label: "Comparing against fingerprint vault", sub: "Match: UEFA Champions League Final 2026" },
                { id: 4, label: "Geo-tagging viewer cluster", sub: "Cluster: South Asia • 47.2K concurrent" },
                { id: 5, label: "Computing risk score", sub: "Confidence 0.94" }
            ];

            useEffect(() => {
                window.lucide.createIcons();
                if (activeTab === 'Overview') renderOverviewCharts();
            }, [activeTab, scanStatus, scanStage]);

            const startScan = () => {
                setScanStatus('scanning');
                setScanStage(0);
                stages.forEach((_, i) => {
                    setTimeout(() => setScanStage(i + 1), (i + 1) * 600);
                });
                setTimeout(() => setScanStatus('result'), stages.length * 700);
            };

            const renderOverviewCharts = () => {
                const ctx = document.getElementById('trafficChart');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['08:10', '10:10', '12:10', '14:10', '16:10', '18:10', '20:10', '22:10'],
                            datasets: [
                                { label: 'Viewers', data: [120, 90, 85, 70, 60, 95, 110, 130], borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', tension: 0.4 },
                                { label: 'Blocked', data: [80, 70, 60, 50, 45, 65, 80, 90], borderColor: '#60a5fa', tension: 0.4 }
                            ]
                        },
                        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
                    });
                }
            };

            return (
                <div className="flex h-screen w-full bg-[#050510]">
                    {/* SIDEBAR */}
                    <aside className="w-[260px] bg-[#03030b] border-r border-slate-800/60 p-6 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 text-blue-500 mb-12 px-2">
                            <i data-lucide="shield" className="w-8 h-8 fill-blue-500/20"></i>
                            <h1 className="text-xl font-black text-white tracking-tighter uppercase">Sports Shield</h1>
                        </div>
                        <nav className="flex-1 space-y-1.5">
                            <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 px-3 mb-4 font-mono">Mission Control</p>
                            {['Overview', 'Scanner', 'Apps', 'Predictions', 'Tracking', 'Assets', 'Enforcement', 'Settings'].map(tab => (
                                <SidebarItem key={tab} id={tab} icon={
                                    tab === 'Overview' ? 'activity' : tab === 'Scanner' ? 'search' : tab === 'Apps' ? 'layers' : 
                                    tab === 'Predictions' ? 'shield-alert' : tab === 'Tracking' ? 'map' : tab === 'Assets' ? 'database' : 
                                    tab === 'Enforcement' ? 'gavel' : 'settings'
                                } label={tab} active={activeTab === tab} onClick={setActiveTab} />
                            ))}
                        </nav>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-12">
                        
                        {/* OVERVIEW */}
                        {activeTab === 'Overview' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-4xl font-black text-white mb-2 tracking-tight">Operations Overview</h2>
                                <p className="text-slate-500 mb-10 text-sm">Real-time piracy intelligence and enforcement metrics.</p>
                                <div className="grid grid-cols-6 gap-4 mb-10">
                                    {[
                                        { l: 'Active Incidents', v: '11', c: '+12%', i: 'zap' },
                                        { l: 'Viewers Blocked', v: '285,400', c: '+5%', i: 'eye-off' },
                                        { l: 'Takedowns Today', v: '5', c: '+2%', i: 'hammer' },
                                        { l: 'Protected Assets', v: '8', c: '0%', i: 'lock' },
                                        { l: 'Revenue Recovered', v: '$4.82M', c: '+18%', i: 'dollar-sign' },
                                        { l: 'Avg Response', v: '47s', c: '-1s', i: 'clock' }
                                    ].map((s, i) => (
                                        <div key={i} className="bg-[#0a0a1f] border border-slate-800/50 p-5 rounded-2xl">
                                            <div className="flex justify-between items-center mb-3">
                                                <i data-lucide={s.i} className="w-4 h-4 text-blue-500"></i>
                                                <span className="text-[10px] text-blue-400 font-bold">{s.c}</span>
                                            </div>
                                            <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">{s.l}</p>
                                            <p className="text-xl font-black text-white">{s.v}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-[#0a0a1f] border border-slate-800 p-8 rounded-3xl h-[350px]">
                                    <h4 className="text-xs font-bold text-slate-400 mb-6 uppercase">24h Piracy Traffic</h4>
                                    <div className="h-[250px]"><canvas id="trafficChart"></canvas></div>
                                </div>
                            </div>
                        )}

                        {/* SCANNER */}
                        {activeTab === 'Scanner' && (
                            <div className="animate-in fade-in duration-500 max-w-4xl mx-auto">
                                <h2 className="text-3xl font-black text-white mb-2 tracking-tight">Stream Scanner</h2>
                                <p className="text-slate-500 mb-10 text-sm font-medium">Probe a stream URL for piracy signals against the fingerprint vault.</p>
                                
                                <div className="bg-[#0a0a1f] border border-slate-800 p-10 rounded-3xl mb-8">
                                    <div className="flex gap-4 mb-4">
                                        <input type="text" value={scanUrl} onChange={(e)=>setScanUrl(e.target.value)} className="flex-1 bg-[#050510] border border-slate-800 rounded-2xl px-6 py-4 text-blue-400 font-mono text-sm focus:outline-none" />
                                        <button onClick={startScan} className="bg-blue-600 hover:bg-blue-500 px-8 rounded-2xl text-xs font-black uppercase text-white transition-all active:scale-95">Run Scan</button>
                                    </div>
                                    <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest">Try: t.me/+RedDevilsHD-EPL | iptv-cricstream.app/channel/star-sports-1</p>
                                </div>

                                {scanStatus === 'scanning' && (
                                    <div className="bg-[#0a0a1f] border border-slate-800 p-10 rounded-3xl space-y-6">
                                        <h3 className="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-[0.2em]">Probe Pipeline</h3>
                                        {stages.map((stage, idx) => (
                                            <div key={stage.id} className={`flex gap-4 items-start transition-all duration-500 ${scanStage > idx ? 'opacity-100 translate-x-0' : 'opacity-20 -translate-x-2'}`}>
                                                <i data-lucide={scanStage > idx ? "check-circle" : "circle"} className={`w-4 h-4 mt-1 ${scanStage > idx ? 'text-blue-500' : 'text-slate-600'}`}></i>
                                                <div>
                                                    <p className="text-[13px] font-bold text-white">{stage.label}</p>
                                                    <p className="text-[11px] text-slate-500 font-mono">{stage.sub}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {scanStatus === 'result' && (
                                    <div className="bg-[#0a0a1f] border border-red-500/20 p-10 rounded-3xl shadow-2xl shadow-red-900/10 animate-in zoom-in-95 duration-300">
                                        <div className="flex justify-between items-center mb-8 pb-6 border-b border-slate-800">
                                            <p className="text-xs font-bold text-slate-500 uppercase">Scan Report: <span className="text-red-500 ml-2">Confirmed Piracy</span></p>
                                            <p className="text-2xl font-black text-white">96/100 <span className="text-[10px] text-red-500 uppercase tracking-tighter">Risk Score</span></p>
                                        </div>
                                        <div className="grid grid-cols-4 gap-4 mb-8">
                                            {[ {l:'Fingerprint', v:'0x00D57A74'}, {l:'Region', v:'Europe'}, {l:'Est. Viewers', v:'16,196'}, {l:'Protocol', v:'HLS'} ].map((r,i)=>(
                                                <div key={i} className="p-4 bg-[#050510] rounded-xl border border-slate-800"><p className="text-[9px] font-bold text-slate-600 uppercase mb-1">{r.l}</p><p className="font-mono text-white text-xs">{r.v}</p></div>
                                            ))}
                                        </div>
                                        <div className="p-5 bg-red-500/5 border border-red-500/20 rounded-2xl mb-8">
                                            <p className="text-[10px] text-red-500 font-black uppercase mb-1">Matched Protected Asset</p>
                                            <p className="text-white font-bold">UEFA Champions League Final 2026</p>
                                        </div>
                                        <button className="w-full py-4 bg-red-600 text-white font-black rounded-2xl text-[10px] uppercase tracking-widest hover:bg-red-500 transition-all">Initiate Automated Takedown</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* PREDICTIONS */}
                        {activeTab === 'Predictions' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-3xl font-black text-white mb-2 tracking-tight">Predictive Intelligence</h2>
                                <p className="text-slate-500 mb-10 text-sm">AI-driven forecasts for upcoming high-risk broadcasting events.</p>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-3xl overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-[#050510] border-b border-slate-800 text-[10px] font-black text-slate-500 uppercase tracking-widest">
                                            <tr><th className="p-6">Match / Event</th><th className="p-6">League</th><th className="p-6">Time to Event</th><th className="p-6">Est. Piracy</th><th className="p-6 text-right">Risk Level</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/40">
                                            {[
                                                { m: 'Manchester United vs Liverpool', l: 'Premier League', t: '30 mins', p: '1.2M+ viewers', r: 'CRITICAL' },
                                                { m: 'Real Madrid vs Barcelona', l: 'La Liga', t: '2h 15m', p: '2.1M+ viewers', r: 'CRITICAL' },
                                                { m: 'Lakers vs Celtics', l: 'NBA', t: '5h 40m', p: '640k+ viewers', r: 'HIGH' },
                                                { m: 'India vs Pakistan — T20', l: 'ICC World Cup', t: '3d 09h', p: '4.5M+ viewers', r: 'CRITICAL' }
                                            ].map((ev, i) => (
                                                <tr key={i} className="hover:bg-slate-800/20 transition-all">
                                                    <td className="p-6 font-bold text-white">{ev.m}</td>
                                                    <td className="p-6 text-slate-400">{ev.l}</td>
                                                    <td className="p-6 text-blue-400 font-mono text-xs">{ev.t}</td>
                                                    <td className="p-6 text-white font-bold">{ev.p}</td>
                                                    <td className="p-6 text-right"><span className={`px-3 py-1 rounded-lg text-[9px] font-black ${ev.r==='CRITICAL' ? 'bg-red-500/10 text-red-500' : 'bg-orange-500/10 text-orange-500'}`}>{ev.r}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* APPS */}
                        {activeTab === 'Apps' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-3xl font-black text-white mb-2 tracking-tight">Monitored Platforms</h2>
                                <p className="text-slate-500 mb-10 text-sm">Surfaces under continuous surveillance for unauthorized rebroadcast.</p>
                                <div className="grid grid-cols-3 gap-6">
                                    {[
                                        { n: 'Illegal IPTV', d: 'Standalone apps streaming pirated channel bundles.', v: '419.4k', i: 2 },
                                        { n: 'TikTok', d: 'Generic web players hosted on bulletproof infra.', v: '184.6k', i: 1 },
                                        { n: 'Twitter/X', d: 'Short clips and embedded live windows of broadcasts.', v: '94.4k', i: 1 },
                                        { n: 'Telegram', d: 'Private channels redistributing live HD streams.', v: '79.0k', i: 2 },
                                        { n: 'Discord', d: 'Voice rooms with embedded live players.', v: '16.8k', i: 1 }
                                    ].map((app, i) => (
                                        <div key={i} className="bg-[#0a0a1f] border border-slate-800 p-8 rounded-3xl">
                                            <div className="flex justify-between items-start mb-6">
                                                <h4 className="text-white font-black text-lg">{app.n}</h4>
                                                <span className="flex items-center gap-1.5 text-[8px] font-black text-red-500 uppercase bg-red-500/5 px-2 py-1 rounded-full"><span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span> Live</span>
                                            </div>
                                            <p className="text-slate-500 text-xs mb-8 leading-relaxed">{app.d}</p>
                                            <div className="flex gap-4">
                                                <div className="flex-1 p-4 bg-[#050510] rounded-2xl border border-slate-800"><p className="text-[9px] font-bold text-slate-600 uppercase mb-1">Incidents</p><p className="text-white font-bold">{app.i}</p></div>
                                                <div className="flex-1 p-4 bg-[#050510] rounded-2xl border border-slate-800"><p className="text-[9px] font-bold text-slate-600 uppercase mb-1">Viewers</p><p className="text-white font-bold">{app.v}</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* SETTINGS */}
                        {activeTab === 'Settings' && (
                            <div className="animate-in fade-in duration-500 max-w-3xl">
                                <h2 className="text-3xl font-black text-white mb-2 tracking-tight">System Settings</h2>
                                <p className="text-slate-500 mb-10 text-sm">Configure detection thresholds and enforcement policies.</p>
                                <div className="space-y-6">
                                    <div className="bg-[#0a0a1f] border border-slate-800 p-8 rounded-3xl">
                                        <h4 className="text-white font-bold mb-6 flex items-center gap-2"><i data-lucide="cpu" className="w-4 h-4 text-blue-500"></i> Detection Engine</h4>
                                        <div className="space-y-8">
                                            <div>
                                                <div className="flex justify-between mb-4 text-[11px] font-bold text-slate-400 uppercase"><span>Risk Score Threshold</span><span className="text-blue-500">75/100</span></div>
                                                <div className="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden"><div className="h-full w-3/4 bg-blue-600 shadow-[0_0_10px_#2563eb]"></div></div>
                                            </div>
                                            <div className="flex items-center justify-between p-4 bg-[#050510] rounded-2xl border border-slate-800">
                                                <div><p className="text-white font-bold text-xs">Content Poisoning Injection</p><p className="text-[10px] text-slate-600 mt-1">Inject corrupted segments into confirmed pirated streams.</p></div>
                                                <div className="w-10 h-5 bg-blue-600 rounded-full relative"><div className="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div></div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-[#0a0a1f] border border-slate-800 p-8 rounded-3xl">
                                        <h4 className="text-white font-bold mb-6 flex items-center gap-2"><i data-lucide="globe" className="w-4 h-4 text-blue-500"></i> Integrations</h4>
                                        <div className="space-y-4">
                                            <div className="p-4 bg-[#050510] rounded-2xl border border-slate-800"><p className="text-[9px] font-bold text-slate-500 uppercase mb-2">Incident Webhook URL</p><p className="text-blue-400 font-mono text-xs">https://hooks.shield.io/incidents</p></div>
                                            <div className="p-4 bg-[#050510] rounded-2xl border border-slate-800 flex justify-between items-center"><p className="text-blue-400 font-mono text-xs tracking-widest">ssk_live_••••••••••••••••3a91</p><button className="text-[10px] font-black uppercase text-slate-500 border border-slate-800 px-3 py-1 rounded-lg hover:bg-slate-800">Rotate</button></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* OTHER TABS FALLBACK */}
                        {!['Overview', 'Scanner', 'Apps', 'Predictions', 'Settings'].includes(activeTab) && (
                            <div className="flex flex-col items-center justify-center h-[60vh] opacity-20">
                                <i data-lucide="construction" className="w-16 h-16 mb-4"></i>
                                <h3 className="text-2xl font-black uppercase tracking-tighter">{activeTab} Secure Module</h3>
                                <p className="text-sm">Interface encrypted. Awaiting biometric authentication.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
