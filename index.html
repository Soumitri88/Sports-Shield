<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Anti-Piracy Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050510; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }
        .scan-effect { position: relative; overflow: hidden; }
        .scan-effect::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px #3b82f6;
            animation: scan-line 2s linear infinite;
        }
    </style>
</head>
<body class="bg-[#050510] text-slate-300 text-[13px] selection:bg-blue-500/30 overflow-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SidebarItem = ({ id, icon, label, active, onClick }) => (
            <button 
                onClick={() => onClick(id)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 group ${
                    active ? 'bg-blue-600/10 text-white border border-blue-500/20 shadow-[0_0_15px_rgba(59,130,246,0.1)]' : 'text-slate-500 hover:text-slate-200 hover:bg-slate-800/40'
                }`}
            >
                <i data-lucide={icon} className={`w-[18px] h-[18px] ${active ? 'text-blue-500' : 'group-hover:text-blue-400'}`}></i>
                <span className="font-semibold text-[13px] tracking-tight">{label}</span>
            </button>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('Overview');
            const [scanStatus, setScanStatus] = useState('idle'); 
            const [scanUrl, setScanUrl] = useState('');
            const chartInstances = useRef({});

            useEffect(() => {
                window.lucide.createIcons();
                if (activeTab === 'Overview') renderOverviewCharts();
            }, [activeTab, scanStatus]);

            const renderOverviewCharts = () => {
                const trafficCtx = document.getElementById('trafficChart');
                if (trafficCtx) {
                    if (chartInstances.current.traffic) chartInstances.current.traffic.destroy();
                    chartInstances.current.traffic = new Chart(trafficCtx, {
                        type: 'line',
                        data: {
                            labels: ['08:10', '10:10', '12:10', '14:10', '16:10', '18:10', '20:10', '22:10', '00:10', '02:10', '04:10', '06:10'],
                            datasets: [{
                                data: [120, 95, 70, 50, 45, 60, 40, 75, 100, 115, 105, 90],
                                borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.05)', fill: true, tension: 0.4, pointRadius: 0
                            }]
                        },
                        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 10 } } }, y: { display: false } } }
                    });
                }
            };

            const runScan = () => {
                if (!scanUrl) return;
                setScanStatus('scanning');
                setTimeout(() => setScanStatus('result'), 2500);
            };

            return (
                <div className="flex h-screen w-full bg-[#050510]">
                    {/* Sidebar - Matching Ascending Order from Screenshots */}
                    <aside className="w-[240px] bg-[#03030b] border-r border-slate-800/60 p-5 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 text-blue-500 mb-10 px-2">
                            <i data-lucide="shield" className="w-7 h-7 fill-blue-500/20"></i>
                            <h1 className="text-lg font-black text-white tracking-tighter uppercase">Sports Shield</h1>
                        </div>

                        <nav className="flex-1 space-y-1">
                            <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 px-3 mb-3">System Navigation</p>
                            <SidebarItem id="Overview" icon="layout-dashboard" label="Overview" active={activeTab === 'Overview'} onClick={setActiveTab} />
                            <SidebarItem id="Scanner" icon="search" label="Scanner" active={activeTab === 'Scanner'} onClick={setActiveTab} />
                            <SidebarItem id="Apps" icon="layers" label="Apps" active={activeTab === 'Apps'} onClick={setActiveTab} />
                            <SidebarItem id="Predictions" icon="trending-up" label="Predictions" active={activeTab === 'Predictions'} onClick={setActiveTab} />
                            <SidebarItem id="Tracking" icon="map" label="Tracking" active={activeTab === 'Tracking'} onClick={setActiveTab} />
                            <SidebarItem id="Assets" icon="lock" label="Assets" active={activeTab === 'Assets'} onClick={setActiveTab} />
                            <SidebarItem id="Enforcement" icon="gavel" label="Enforcement" active={activeTab === 'Enforcement'} onClick={setActiveTab} />
                            <SidebarItem id="Settings" icon="settings" label="Settings" active={activeTab === 'Settings'} onClick={setActiveTab} />
                        </nav>
                    </aside>

                    {/* Main Workspace */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar bg-[#050510] p-10">
                        
                        {/* OVERVIEW SECTION */}
                        {activeTab === 'Overview' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white tracking-tight">Operations Overview</h2>
                                <p className="text-slate-500 text-sm mt-1 mb-8">Real-time piracy intelligence and global enforcement metrics.</p>
                                
                                <div className="grid grid-cols-6 gap-3 mb-8">
                                    {[
                                        { l: 'Active Incidents', v: '11', c: '+12%', i: 'activity', clr: 'text-red-500' },
                                        { l: 'Viewers Blocked', v: '285,400', c: '+5%', i: 'eye-off', clr: 'text-blue-400' },
                                        { l: 'Takedowns', v: '5', c: '+2%', i: 'gavel', clr: 'text-blue-500' },
                                        { l: 'Assets', v: '8', c: '0%', i: 'lock', clr: 'text-blue-600' },
                                        { l: 'Revenue', v: '$4.82M', c: '+18%', i: 'dollar-sign', clr: 'text-emerald-500' },
                                        { l: 'Avg Time', v: '47s', c: '-1s', i: 'clock', clr: 'text-orange-500' }
                                    ].map((s, idx) => (
                                        <div key={idx} className="bg-[#0a0a1f] border border-slate-800 p-4 rounded-xl">
                                            <div className="flex justify-between items-start mb-2">
                                                <i data-lucide={s.i} className={`w-3.5 h-3.5 ${s.clr}`}></i>
                                                <span className="text-[9px] font-black text-blue-400">{s.c}</span>
                                            </div>
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter mb-1">{s.l}</p>
                                            <p className="text-lg font-black text-white leading-none">{s.v}</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-3 gap-6">
                                    <div className="col-span-2 bg-[#0a0a1f] border border-slate-800 p-6 rounded-2xl h-[300px]">
                                        <h4 className="text-xs font-bold text-white mb-6 uppercase tracking-widest">24h Traffic Impact</h4>
                                        <div className="h-[200px]"><canvas id="trafficChart"></canvas></div>
                                    </div>
                                    <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-2xl flex flex-col justify-between">
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-6">AI Efficiency</p>
                                            <p className="text-5xl font-black text-white">94%</p>
                                            <p className="text-xs mt-4 opacity-80 leading-relaxed">Optimization across all digital assets via fingerprinting.</p>
                                        </div>
                                        <button className="w-full py-3 bg-white/10 hover:bg-white/20 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/20">System Report</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SCANNER SECTION (Integrated and Working) */}
                        {activeTab === 'Scanner' && (
                            <div className="max-w-4xl mx-auto animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white tracking-tight">Stream Scanner</h2>
                                <p className="text-slate-500 text-sm mt-1 mb-8">Direct probe interface for validating suspicious stream URLs.</p>

                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-10 mb-6 relative overflow-hidden">
                                    <div className="flex items-center gap-3 mb-6">
                                        <i data-lucide="zap" className="w-4 h-4 text-blue-500"></i>
                                        <h3 className="text-xs font-bold text-white uppercase tracking-widest">Active Probe Input</h3>
                                    </div>
                                    <div className="flex gap-3 relative z-10">
                                        <input 
                                            type="text" 
                                            value={scanUrl}
                                            onChange={(e) => setScanUrl(e.target.value)}
                                            placeholder="Paste URL (e.g. t.me/sports-live or youtube.com/watch?v=...)" 
                                            className="flex-1 bg-[#050510] border border-slate-800 rounded-xl px-5 py-4 text-blue-400 font-mono text-sm focus:outline-none focus:border-blue-500 transition-all"
                                        />
                                        <button 
                                            onClick={runScan}
                                            disabled={scanStatus === 'scanning'}
                                            className="bg-blue-600 hover:bg-blue-500 text-white font-black px-10 rounded-xl text-xs uppercase tracking-widest flex items-center gap-2 transition-all active:scale-95 disabled:opacity-50"
                                        >
                                            {scanStatus === 'scanning' ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <i data-lucide="search" className="w-4 h-4"></i>}
                                            {scanStatus === 'scanning' ? 'Scanning...' : 'Run Analysis'}
                                        </button>
                                    </div>
                                </div>

                                {scanStatus === 'scanning' && (
                                    <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-8 space-y-6 scan-effect">
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Pipeline Execution</p>
                                        {[
                                            { t: 'Decoding protocol architecture', s: 'HLS / DASH detected' },
                                            { t: 'Extracting media fingerprints', s: 'Comparing video frames...' },
                                            { t: 'Asset Vault lookup', s: 'Checking 8 protected assets...' }
                                        ].map((p, i) => (
                                            <div key={i} className="flex gap-4">
                                                <div className="w-5 h-5 rounded-full bg-blue-500/10 border border-blue-500/40 flex items-center justify-center"><div className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div></div>
                                                <div><p className="text-[11px] font-bold text-white">{p.t}</p><p className="text-[10px] text-slate-500">{p.s}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {scanStatus === 'result' && (
                                    <div className="bg-[#0a0a1f] border border-red-500/30 rounded-2xl p-8 animate-in zoom-in-95 duration-500">
                                        <div className="flex justify-between items-center mb-8 pb-8 border-b border-slate-800/50">
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-500 uppercase mb-1">Target Analysis</p>
                                                <p className="text-[11px] text-blue-400 font-mono">{scanUrl}</p>
                                            </div>
                                            <span className="bg-red-500/20 text-red-500 text-[9px] font-black px-3 py-1 rounded border border-red-500/30 uppercase tracking-widest">Confirmed Piracy</span>
                                        </div>
                                        <div className="grid grid-cols-4 gap-4 mb-8">
                                            {[ {l:'Score', v:'96/100', c:'text-red-500'}, {l:'Region', v:'Global', c:'text-white'}, {l:'Impact', v:'Critical', c:'text-white'}, {l:'Hash', v:'0x3D2F7A', c:'text-white font-mono'} ].map((r, i) => (
                                                <div key={i} className="p-4 bg-[#050510] rounded-xl border border-slate-800/50 text-center">
                                                    <p className="text-[9px] font-bold text-slate-500 uppercase mb-1">{r.l}</p>
                                                    <p className={`text-sm font-black ${r.c}`}>{r.v}</p>
                                                </div>
                                            ))}
                                        </div>
                                        <button className="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-black text-xs rounded-xl uppercase tracking-widest shadow-lg transition-all active:scale-95">Send Takedown Notice</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* APPS SECTION */}
                        {activeTab === 'Apps' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white tracking-tight">Monitored Platforms</h2>
                                <p className="text-slate-500 text-sm mt-1 mb-8">Continuous surveillance of third-party streaming surfaces.</p>
                                <div className="grid grid-cols-3 gap-5">
                                    {[
                                        { n: 'Illegal IPTV', t: 'IPTV App', v: '419.4k', s: '17%', icon: 'tv' },
                                        { n: 'TikTok Live', t: 'Social', v: '184.6k', s: '8%', icon: 'video' },
                                        { n: 'Telegram', t: 'Messaging', v: '79.0k', s: '12%', icon: 'send' }
                                    ].map((app, i) => (
                                        <div key={i} className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-6 hover:border-blue-500/40 transition-all group">
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="flex gap-3">
                                                    <div className="p-3 bg-blue-500/5 rounded-xl border border-blue-500/10"><i data-lucide={app.icon} className="w-5 h-5 text-blue-500"></i></div>
                                                    <div><h4 className="text-sm font-bold text-white">{app.n}</h4><span className="text-[9px] font-black text-slate-500 uppercase px-1.5 py-0.5 bg-slate-800/50 rounded">{app.t}</span></div>
                                                </div>
                                                <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="bg-[#050510] p-3 rounded-xl border border-slate-800/50 text-center"><p className="text-[8px] text-slate-500 uppercase font-bold">Viewers</p><p className="text-white text-xs font-black">{app.v}</p></div>
                                                <div className="bg-[#050510] p-3 rounded-xl border border-slate-800/50 text-center"><p className="text-[8px] text-slate-500 uppercase font-bold">Global Share</p><p className="text-white text-xs font-black">{app.s}</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* PREDICTIONS SECTION */}
                        {activeTab === 'Predictions' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white tracking-tight">Predictive Intelligence</h2>
                                <p className="text-slate-500 text-sm mt-1 mb-8">AI forecasting for high-risk broadcasting events.</p>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl overflow-hidden">
                                    <table className="w-full text-left text-[12px]">
                                        <thead className="bg-[#050510] text-slate-500 uppercase font-bold text-[10px] border-b border-slate-800">
                                            <tr>
                                                <th className="px-6 py-4">Match / Event</th>
                                                <th className="px-6 py-4">League</th>
                                                <th className="px-6 py-4">Est. Piracy</th>
                                                <th className="px-6 py-4 text-right">Risk Level</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {[
                                                { m: 'Manchester United vs Liverpool', l: 'Premier League', p: '1.2M+', r: 'Critical' },
                                                { m: 'Real Madrid vs Barcelona', l: 'La Liga', p: '2.1M+', r: 'Critical' },
                                                { m: 'Lakers vs Celtics', l: 'NBA', p: '640k+', r: 'High' }
                                            ].map((ev, i) => (
                                                <tr key={i} className="hover:bg-slate-800/20">
                                                    <td className="px-6 py-4 font-bold text-white">{ev.m}</td>
                                                    <td className="px-6 py-4 text-slate-500">{ev.l}</td>
                                                    <td className="px-6 py-4 text-red-500 font-bold">{ev.p}</td>
                                                    <td className="px-6 py-4 text-right"><span className="bg-red-500 text-white px-2 py-0.5 rounded text-[8px] font-black uppercase">{ev.r}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                        
                        {/* FALLBACK FOR OTHER SECTIONS */}
                        {!['Overview', 'Scanner', 'Apps', 'Predictions'].includes(activeTab) && (
                            <div className="flex flex-col items-center justify-center h-[60vh] opacity-20">
                                <i data-lucide="shield-off" className="w-16 h-16 mb-4"></i>
                                <h3 className="text-xl font-black uppercase tracking-widest">{activeTab}</h3>
                                <p className="text-xs">Connecting to secure data pipe...</p>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
