<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Operations Overview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#050510] text-slate-200 font-sans overflow-x-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const StatCard = ({ title, value, change, icon, color }) => (
            <div className="bg-[#0a0a1f] border border-slate-800 p-4 rounded-xl shadow-sm">
                <div className="flex justify-between items-start mb-3">
                    <div className={`p-2 rounded-lg bg-opacity-10 ${color.bg}`}>
                        <i data-lucide={icon} className={`w-5 h-5 ${color.text}`}></i>
                    </div>
                    <span className="text-[10px] font-bold text-blue-400 uppercase">{change}</span>
                </div>
                <h3 className="text-slate-500 text-xs font-bold uppercase tracking-widest">{title}</h3>
                <p className="text-2xl font-bold text-white mt-1">{value}</p>
            </div>
        );

        function App() {
            const [view, setView] = useState('Overview');

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                
                if (view === 'Overview') {
                    // 1. Line Chart: 24h Piracy Traffic
                    new Chart(document.getElementById('trafficChart'), {
                        type: 'line',
                        data: {
                            labels: ['07:14', '11:14', '15:14', '19:14', '23:14', '03:14', '05:14'],
                            datasets: [{
                                data: [120, 90, 60, 50, 80, 110, 100],
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                fill: true, tension: 0.4, pointRadius: 0
                            }, {
                                data: [80, 70, 55, 40, 60, 90, 85],
                                borderColor: '#22d3ee',
                                borderDash: [5, 5],
                                fill: false, tension: 0.4, pointRadius: 0
                            }]
                        },
                        options: { 
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } }
                        }
                    });

                    // 2. Horizontal Bar: Regional Distribution
                    new Chart(document.getElementById('regionChart'), {
                        type: 'bar',
                        data: {
                            labels: ['Asia', 'Europe', 'Global', 'Middle East', 'Africa'],
                            datasets: [{
                                data: [240000, 120000, 70000, 65000, 40000],
                                backgroundColor: '#3b82f6',
                                borderRadius: 4,
                                barThickness: 12
                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { x: { grid: { display: false }, ticks: { color: '#64748b' } }, y: { grid: { display: false }, ticks: { color: '#64748b' } } }
                        }
                    });

                    // 3. Vertical Bar: Source Platforms
                    new Chart(document.getElementById('sourceChart'), {
                        type: 'bar',
                        data: {
                            labels: ['TikTok', 'Twitter/X', 'Facebook', 'Reddit', 'Discord'],
                            datasets: [{
                                data: [2.1, 1.0, 2.1, 1.0, 1.1],
                                backgroundColor: '#60a5fa',
                                borderRadius: 4
                            }]
                        },
                        options: {
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#64748b' } } }
                        }
                    });
                }
            }, [view]);

            return (
                <div className="flex h-screen w-full bg-[#050510]">
                    <aside className="w-64 bg-[#03030b] border-r border-slate-800 p-6 space-y-8">
                        <div className="flex items-center gap-3 text-blue-500">
                            <i data-lucide="shield" className="w-8 h-8"></i>
                            <span className="text-xl font-bold text-white">Sports Shield</span>
                        </div>
                        <nav className="space-y-2">
                            {['Overview', 'Scanner', 'Apps', 'Predictions', 'Tracking', 'Enforcement'].map(item => (
                                <button key={item} onClick={() => setView(item)} className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition ${view === item ? 'bg-blue-600/10 text-blue-500 border border-blue-600/20' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <i data-lucide={item === 'Overview' ? 'layout-dashboard' : 'box'} className="w-4 h-4"></i>
                                    {item}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-8">
                        <header className="mb-8">
                            <h2 className="text-3xl font-bold text-white">Operations Overview</h2>
                            <p className="text-slate-400 text-sm">Real-time piracy intelligence and enforcement metrics.</p>
                        </header>

                        {view === 'Overview' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                                    <StatCard title="Active Incidents" value="11" change="+12% from yesterday" icon="activity" color={{bg:'bg-red-500', text:'text-red-500'}} />
                                    <StatCard title="Viewers Blocked" value="285,400" change="+5% from yesterday" icon="eye-off" color={{bg:'bg-blue-500', text:'text-blue-500'}} />
                                    <StatCard title="Takedowns Today" value="5" change="+2% from yesterday" icon="gavel" color={{bg:'bg-blue-400', text:'text-blue-400'}} />
                                    <StatCard title="Protected Assets" value="8" change="0% from yesterday" icon="lock" color={{bg:'bg-blue-600', text:'text-blue-600'}} />
                                    <StatCard title="Revenue Recovered" value="$4.82M" change="+18% from yesterday" icon="dollar-sign" color={{bg:'bg-blue-500', text:'text-blue-500'}} />
                                    <StatCard title="Avg Response" value="47s" change="-1s from yesterday" icon="clock" color={{bg:'bg-yellow-500', text:'text-yellow-500'}} />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-[#0a0a1f] border border-slate-800 rounded-xl p-6">
                                        <h4 className="text-sm font-bold text-white mb-4">24h Piracy Traffic</h4>
                                        <div className="h-64"><canvas id="trafficChart"></canvas></div>
                                    </div>
                                    <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl p-6">
                                        <h4 className="text-sm font-bold text-white mb-4">High-Risk Upcoming</h4>
                                        <div className="space-y-4">
                                            {['Manchester United vs Liverpool', 'Real Madrid vs Barcelona'].map(match => (
                                                <div key={match} className="p-3 bg-slate-900/50 rounded-lg border border-slate-800 flex justify-between items-center">
                                                    <span className="text-xs text-white font-medium">{match}</span>
                                                    <span className="bg-red-500/10 text-red-500 text-[10px] px-2 py-1 rounded font-bold">CRITICAL</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl p-6 text-white">
                                        <h4 className="text-sm font-bold mb-4">Regional Distribution</h4>
                                        <div className="h-64"><canvas id="regionChart"></canvas></div>
                                    </div>
                                    <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl p-6 text-white">
                                        <h4 className="text-sm font-bold mb-4">Source Platforms</h4>
                                        <div className="h-64"><canvas id="sourceChart"></canvas></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
