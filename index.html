<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#050510] text-slate-200 font-sans overflow-x-hidden text-[11px]">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Components ---
        const StatCard = ({ title, value, change, icon, color }) => (
            <div className="bg-[#0a0a1f] border border-slate-800 p-3 rounded-lg hover:border-blue-500 transition-all">
                <div className="flex justify-between items-start mb-2">
                    <div className={`p-1.5 rounded-md bg-opacity-10 ${color.bg}`}>
                        <i data-lucide={icon} className={`w-3.5 h-3.5 ${color.text}`}></i>
                    </div>
                    <span className="text-[9px] font-bold text-blue-400 uppercase">{change}</span>
                </div>
                <h3 className="text-slate-500 text-[10px] font-bold uppercase tracking-tighter">{title}</h3>
                <p className="text-xl font-bold text-white mt-0.5">{value}</p>
            </div>
        );

        const PlatformCard = ({ name, type, description, incidents, viewers, share, icon }) => (
            <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl p-5 hover:border-blue-500/50 transition-all group">
                <div className="flex justify-between items-start mb-4">
                    <div className="flex items-center gap-3">
                        <div className="p-2 bg-blue-500/5 rounded-lg border border-blue-500/10">
                            <i data-lucide={icon} className="w-5 h-5 text-blue-500"></i>
                        </div>
                        <div>
                            <h3 className="text-sm font-bold text-white tracking-tight">{name}</h3>
                            <span className="text-[9px] font-bold text-slate-500 uppercase bg-slate-800/50 px-1.5 py-0.5 rounded">{type}</span>
                        </div>
                    </div>
                    <div className="flex items-center gap-1.5">
                        <span className="h-1.5 w-1.5 rounded-full bg-red-500 animate-pulse"></span>
                        <span className="text-[9px] font-bold text-red-500 uppercase tracking-widest">Live</span>
                    </div>
                </div>
                <p className="text-slate-400 text-[11px] mb-6 leading-relaxed h-8">{description}</p>
                <div className="grid grid-cols-3 gap-2 mb-4">
                    <div className="bg-[#050510] p-3 rounded-lg border border-slate-800/50 text-center">
                        <p className="text-white text-xs font-black">{incidents}</p>
                        <p className="text-[8px] text-slate-500 uppercase font-bold mt-1">Incidents</p>
                    </div>
                    <div className="bg-[#050510] p-3 rounded-lg border border-slate-800/50 text-center">
                        <p className="text-white text-xs font-black">{viewers}</p>
                        <p className="text-[8px] text-slate-500 uppercase font-bold mt-1">Viewers</p>
                    </div>
                    <div className="bg-[#050510] p-3 rounded-lg border border-slate-800/50 text-center">
                        <p className="text-white text-xs font-black">{share}</p>
                        <p className="text-[8px] text-slate-500 uppercase font-bold mt-1">Share</p>
                    </div>
                </div>
            </div>
        );

        function App() {
            const [view, setView] = useState('Overview');
            const [scanStatus, setScanStatus] = useState('idle');
            const [url, setUrl] = useState('');
            const chartInstances = useRef({});

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                if (view === 'Overview') renderCharts();
            }, [view]);

            const renderCharts = () => {
                const trafficCtx = document.getElementById('trafficChart');
                if (trafficCtx) {
                    chartInstances.current.traffic = new Chart(trafficCtx, {
                        type: 'line',
                        data: {
                            labels: ['07:14', '09:14', '11:14', '13:14', '15:14', '17:14', '19:14', '21:14', '23:14', '01:14', '03:14', '05:14'],
                            datasets: [{
                                data: [120, 110, 90, 70, 60, 55, 50, 45, 80, 100, 120, 110],
                                borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4, pointRadius: 0
                            }]
                        },
                        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 } } } } }
                    });
                }
            };

            const handleScan = () => {
                setScanStatus('scanning');
                setTimeout(() => {
                    setScanStatus('completed');
                    setTimeout(() => window.lucide.createIcons(), 50);
                }, 2000);
            };

            const predictions = [
                { match: "Manchester United vs Liverpool", league: "Premier League", time: "30 mins", piracy: "1.2M+ viewers", viewers: "1,240,000", conf: "0.94", level: "Critical", lColor: "bg-red-500" },
                { match: "Real Madrid vs Barcelona — El Clásico", league: "La Liga", time: "2h 15m", piracy: "2.1M+ viewers", viewers: "2,140,000", conf: "0.97", level: "Critical", lColor: "bg-red-500" },
                { match: "Lakers vs Celtics", league: "NBA", time: "5h 40m", piracy: "640K+ viewers", viewers: "640,000", conf: "0.88", level: "High", lColor: "bg-orange-500" },
                { match: "Monaco Grand Prix — Final Practice", league: "Formula 1", time: "8h 02m", piracy: "410K+ viewers", viewers: "410,000", conf: "0.82", level: "High", lColor: "bg-orange-500" },
                { match: "Bayern Munich vs PSG", league: "UEFA Champions League", time: "1d 03h", piracy: "1.8M+ viewers", viewers: "1,810,000", conf: "0.95", level: "Critical", lColor: "bg-red-500" },
                { match: "India vs Pakistan — T20 World Cup", league: "ICC", time: "3d 09h", piracy: "4.5M+ viewers", viewers: "4,550,000", conf: "0.99", level: "Critical", lColor: "bg-red-500" }
            ];

            return (
                <div className="flex h-screen w-full bg-[#050510]">
                    {/* Sidebar */}
                    <aside className="w-56 bg-[#03030b] border-r border-slate-800 p-4 flex flex-col">
                        <div className="flex items-center gap-2 text-blue-500 mb-10 px-2">
                            <i data-lucide="shield" className="w-6 h-6"></i>
                            <span className="text-lg font-bold text-white tracking-tight">Sports Shield</span>
                        </div>
                        <nav className="space-y-1 flex-1 text-slate-500">
                            <p className="text-[9px] font-bold uppercase tracking-widest px-3 mb-2">Mission Control</p>
                            {[
                                { id: 'Overview', icon: 'layout-dashboard' },
                                { id: 'Scanner', icon: 'search' },
                                { id: 'Apps', icon: 'layers' },
                                { id: 'Predictions', icon: 'trending-up' },
                                { id: 'Tracking', icon: 'map' },
                                { id: 'Assets', icon: 'lock' },
                                { id: 'Enforcement', icon: 'gavel' },
                                { id: 'Settings', icon: 'settings' }
                            ].map((item) => (
                                <button key={item.id} onClick={() => setView(item.id)} className={`w-full flex items-center gap-3 px-3 py-2 rounded-md font-medium transition ${view === item.id ? 'bg-blue-600/10 text-blue-400 border border-blue-600/20' : 'hover:text-white hover:bg-slate-800'}`}>
                                    <i data-lucide={item.icon} className="w-4 h-4"></i> {item.id}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 overflow-y-auto p-8">
                        <header className="mb-8">
                            <h2 className="text-2xl font-bold text-white tracking-tight">
                                {view === 'Predictions' ? 'Predictive Intelligence' : view}
                            </h2>
                            <p className="text-slate-500 mt-1">
                                {view === 'Predictions' ? 'AI-driven forecasts for upcoming high-risk broadcasting events.' : 'Real-time piracy intelligence and metrics.'}
                            </p>
                        </header>

                        {view === 'Overview' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-6 gap-4">
                                    <StatCard title="Active Incidents" value="11" change="+12%" icon="activity" color={{bg:'bg-red-500', text:'text-red-500'}} />
                                    <StatCard title="Viewers Blocked" value="285,400" change="+5%" icon="eye-off" color={{bg:'bg-blue-500', text:'text-blue-500'}} />
                                    <StatCard title="Takedowns" value="5" change="+2%" icon="gavel" color={{bg:'bg-blue-400', text:'text-blue-400'}} />
                                    <StatCard title="Revenue Recovered" value="$4.82M" change="+18%" icon="dollar-sign" color={{bg:'bg-blue-500', text:'text-blue-500'}} />
                                </div>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl p-6">
                                    <h4 className="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">24h Piracy Traffic</h4>
                                    <canvas id="trafficChart" className="h-48"></canvas>
                                </div>
                            </div>
                        )}

                        {view === 'Scanner' && (
                            <div className="max-w-4xl space-y-6">
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl p-8">
                                    <h3 className="text-sm font-bold text-white uppercase mb-4 flex items-center gap-2">
                                        <i data-lucide="zap" className="w-4 h-4 text-blue-500"></i> Live Probe
                                    </h3>
                                    <div className="flex gap-2">
                                        <input type="text" value={url} onChange={(e) => setUrl(e.target.value)} placeholder="Paste stream URL or telegram handle..." className="flex-1 bg-[#050510] border border-slate-800 rounded-lg px-4 py-3 font-mono text-blue-400" />
                                        <button onClick={handleScan} className="bg-blue-600 px-6 py-3 rounded-lg font-bold">Run Scan</button>
                                    </div>
                                </div>
                                {scanStatus === 'completed' && (
                                    <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl p-6 animate-in fade-in">
                                        <div className="flex justify-between mb-6"><h4 className="font-bold">Scan Report</h4><span className="text-orange-500 font-bold uppercase">Suspicious</span></div>
                                        <div className="grid grid-cols-4 gap-4">
                                            <div className="bg-[#050510] p-4 rounded-lg border border-slate-800 text-center"><p className="text-slate-500 uppercase text-[9px] mb-1">Risk Score</p><p className="text-xl font-bold text-blue-400">95/100</p></div>
                                            <div className="bg-[#050510] p-4 rounded-lg border border-slate-800 text-center"><p className="text-slate-500 uppercase text-[9px] mb-1">Region</p><p className="text-xl font-bold">South Asia</p></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'Apps' && (
                            <div className="grid grid-cols-3 gap-6">
                                <PlatformCard name="Illegal IPTV" type="IPTV App" description="Standalone apps streaming pirated channel bundles." incidents="2" viewers="419.4k" share="17%" icon="tv" />
                                <PlatformCard name="TikTok" type="Web" description="Generic web players hosted on bulletproof infra." incidents="1" viewers="184.6k" share="8%" icon="globe" />
                                <PlatformCard name="Telegram" type="Messaging" description="Private channels redistributing live HD streams." incidents="2" viewers="79.0k" share="17%" icon="send" />
                            </div>
                        )}

                        {view === 'Predictions' && (
                            <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl overflow-hidden">
                                <div className="p-6 border-b border-slate-800">
                                    <h4 className="text-sm font-bold text-white tracking-tight uppercase">Forecasted Risk Events</h4>
                                    <p className="text-slate-500 text-[10px] mt-1">Events analyzed and scored by likelihood of large-scale piracy.</p>
                                </div>
                                <table className="w-full text-left">
                                    <thead className="bg-[#050510] text-slate-500 text-[9px] uppercase font-bold border-b border-slate-800">
                                        <tr>
                                            <th className="px-6 py-4">Match / Event</th>
                                            <th className="px-6 py-4">League</th>
                                            <th className="px-6 py-4">Time to Event</th>
                                            <th className="px-6 py-4">Est. Piracy</th>
                                            <th className="px-6 py-4">Confidence</th>
                                            <th className="px-6 py-4">Risk Level</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/50">
                                        {predictions.map((p, i) => (
                                            <tr key={i} className="hover:bg-slate-800/20 transition-colors">
                                                <td className="px-6 py-4 font-bold text-white">{p.match}</td>
                                                <td className="px-6 py-4 text-slate-400">{p.league}</td>
                                                <td className="px-6 py-4 text-slate-400">{p.time}</td>
                                                <td className="px-6 py-4 text-white">
                                                    <div className="flex items-center gap-1.5 text-red-400 font-bold">
                                                        <i data-lucide="alert-triangle" className="w-3 h-3"></i> {p.piracy}
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4 text-blue-400 font-mono font-bold">{p.conf}</td>
                                                <td className="px-6 py-4">
                                                    <span className={`${p.lColor} text-white text-[9px] font-black px-2 py-0.5 rounded uppercase tracking-tighter`}>
                                                        {p.level}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
