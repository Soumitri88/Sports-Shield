<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#050510] text-slate-200 font-sans overflow-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const StatCard = ({ title, value, change, icon: Icon, color }) => (
            <div className="bg-[#0a0a1f] border border-slate-800 p-5 rounded-xl hover:border-blue-500 transition-all">
                <div className="flex justify-between items-start mb-4">
                    <div className={`p-2 rounded-lg bg-opacity-10 ${color.bg}`}>
                        <Icon size={20} className={color.text} />
                    </div>
                    <span className={`text-xs font-medium ${change.startsWith('+') ? 'text-blue-400' : 'text-red-400'}`}>
                        {change} from yesterday
                    </span>
                </div>
                <h3 className="text-slate-400 text-sm font-medium uppercase tracking-wider">{title}</h3>
                <p className="text-3xl font-bold mt-1 text-white">{value}</p>
            </div>
        );

        function App() {
            const [view, setView] = useState('Overview');
            const chartRef = useRef(null);

            // Initialize Chart.js
            useEffect(() => {
                if (view === 'Overview') {
                    const ctx = document.getElementById('piracyChart')?.getContext('2d');
                    if (ctx) {
                        new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: ['06:57', '08:57', '10:57', '12:57', '14:57', '16:57', '18:57'],
                                datasets: [{
                                    label: 'Estimated Viewers',
                                    data: [80, 82, 60, 45, 55, 120, 90],
                                    borderColor: '#3b82f6',
                                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                    fill: true,
                                    tension: 0.4
                                }]
                            },
                            options: { 
                                responsive: true, 
                                maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: { y: { display: false }, x: { grid: { display: false } } }
                            }
                        });
                    }
                }
                lucide.createIcons();
            }, [view]);

            const navItems = [
                { id: 'Overview', icon: 'layout-dashboard', label: 'Overview' },
                { id: 'Scanner', icon: 'search', label: 'Scanner' },
                { id: 'Tracking', icon: 'crosshair', label: 'Tracking' },
                { id: 'Enforcement', icon: 'shield-alert', label: 'Enforcement' },
            ];

            return (
                <div className="flex h-screen w-full">
                    {/* SIDEBAR */}
                    <aside className="w-64 bg-[#03030b] border-r border-slate-800 flex flex-col p-6">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-blue-600 p-1.5 rounded-lg">
                                <i data-lucide="shield-check" className="text-white w-6 h-6"></i>
                            </div>
                            <h1 className="text-xl font-bold tracking-tight text-white">Sports Shield</h1>
                        </div>
                        
                        <nav className="space-y-2 flex-1">
                            {navItems.map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setView(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all ${
                                        view === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/20' : 'text-slate-400 hover:text-white hover:bg-slate-800'
                                    }`}
                                >
                                    <i data-lucide={item.icon} className="w-4 h-4"></i>
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 overflow-y-auto p-8 lg:p-12">
                        <header className="mb-10">
                            <h2 className="text-3xl font-bold text-white mb-2">{view} Dashboard</h2>
                            <p className="text-slate-400">Real-time piracy intelligence and enforcement metrics.</p>
                        </header>

                        {view === 'Overview' && (
                            <div className="space-y-8">
                                {/* STATS GRID */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <StatCard title="Active Incidents" value="11" change="+12%" icon={lucide.Activity} color={{bg: 'bg-blue-500', text: 'text-blue-500'}} />
                                    <StatCard title="Viewers Blocked" value="285,400" change="+5%" icon={lucide.EyeOff} color={{bg: 'bg-cyan-500', text: 'text-cyan-500'}} />
                                    <StatCard title="Takedowns Today" value="5" change="+2%" icon={lucide.Hammer} color={{bg: 'bg-purple-500', text: 'text-purple-500'}} />
                                    <StatCard title="Revenue Saved" value="$4.82M" change="+18%" icon={lucide.DollarSign} color={{bg: 'bg-emerald-500', text: 'text-emerald-500'}} />
                                </div>

                                {/* CHART AREA */}
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-8 h-80">
                                    <h4 className="text-slate-400 uppercase text-xs font-bold tracking-widest mb-6">24h Piracy Traffic</h4>
                                    <canvas id="piracyChart"></canvas>
                                </div>
                            </div>
                        )}

                        {view !== 'Overview' && (
                            <div className="h-64 flex flex-col items-center justify-center border-2 border-dashed border-slate-800 rounded-2xl">
                                <i data-lucide="loader" className="w-8 h-8 text-blue-500 animate-spin mb-4"></i>
                                <p className="text-slate-500 italic">Initializing AI module for {view}...</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
