<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Anti-Piracy Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050510; color: #cbd5e1; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050510; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        @keyframes scan-glow {
            0%, 100% { opacity: 0.5; transform: translateY(-10%); }
            50% { opacity: 1; transform: translateY(10%); }
        }
        .scanning-active { position: relative; overflow: hidden; }
        .scanning-active::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: #3b82f6; box-shadow: 0 0 20px #3b82f6;
            animation: scan-glow 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="text-[13px] selection:bg-blue-500/30 overflow-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SidebarItem = ({ id, icon, label, active, onClick }) => (
            <button 
                onClick={() => onClick(id)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 group ${
                    active ? 'bg-blue-600/10 text-white border border-blue-500/20 shadow-[0_0_15px_rgba(59,130,246,0.1)]' : 'text-slate-500 hover:text-slate-200 hover:bg-slate-800/40'
                }`}
            >
                <i data-lucide={icon} className={`w-[18px] h-[18px] ${active ? 'text-blue-500' : 'group-hover:text-blue-400'}`}></i>
                <span className="font-semibold tracking-tight">{label}</span>
            </button>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('Overview');
            const [scanStatus, setScanStatus] = useState('idle'); 
            const [scanUrl, setScanUrl] = useState('');
            const chartInstances = useRef({});

            useEffect(() => {
                window.lucide.createIcons();
                if (activeTab === 'Overview') {
                    renderMainChart();
                }
            }, [activeTab, scanStatus]);

            const renderMainChart = () => {
                const ctx = document.getElementById('mainAnalyticsChart');
                if (ctx) {
                    if (chartInstances.current.main) chartInstances.current.main.destroy();
                    chartInstances.current.main = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'],
                            datasets: [{
                                label: 'Piracy Traffic',
                                data: [65, 59, 80, 81, 56, 55, 40, 70],
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 0
                            }]
                        },
                        options: { 
                            maintainAspectRatio: false, 
                            plugins: { legend: { display: false } },
                            scales: { 
                                x: { grid: { display: false }, ticks: { color: '#475569' } },
                                y: { grid: { color: '#1e293b' }, ticks: { display: false } }
                            }
                        }
                    });
                }
            };

            const startScan = () => {
                if (!scanUrl) return;
                setScanStatus('scanning');
                setTimeout(() => setScanStatus('result'), 3000);
            };

            return (
                <div className="flex h-screen w-full">
                    {/* Navigation Sidebar */}
                    <aside className="w-[260px] bg-[#03030b] border-r border-slate-800/60 p-6 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 text-blue-500 mb-12 px-2">
                            <i data-lucide="shield" className="w-8 h-8 fill-blue-500/20"></i>
                            <h1 className="text-xl font-black text-white tracking-tighter uppercase">Sports Shield</h1>
                        </div>

                        <nav className="flex-1 space-y-1.5">
                            <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 px-3 mb-4">Command Center</p>
                            {[
                                { id: 'Overview', icon: 'activity' },
                                { id: 'Scanner', icon: 'search' },
                                { id: 'Apps', icon: 'layers' },
                                { id: 'Predictions', icon: 'trending-up' },
                                { id: 'Tracking', icon: 'map' },
                                { id: 'Assets', icon: 'lock' },
                                { id: 'Enforcement', icon: 'gavel' },
                                { id: 'Settings', icon: 'settings' }
                            ].map(item => (
                                <SidebarItem 
                                    key={item.id} 
                                    id={item.id} 
                                    icon={item.icon} 
                                    label={item.id} 
                                    active={activeTab === item.id} 
                                    onClick={(id) => { setActiveTab(id); setScanStatus('idle'); }} 
                                />
                            ))}
                        </nav>

                        <div className="mt-auto p-4 bg-slate-900/40 rounded-2xl border border-slate-800/60">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center font-bold text-white">AD</div>
                                <div>
                                    <p className="text-white font-bold text-xs">Admin Node</p>
                                    <p className="text-blue-500 text-[10px] font-black uppercase">Live Connection</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Content Area */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-12">
                        
                        {/* OVERVIEW TAB */}
                        {activeTab === 'Overview' && (
                            <div className="animate-in fade-in duration-700">
                                <div className="mb-10">
                                    <h2 className="text-3xl font-extrabold text-white tracking-tight">System Dashboard</h2>
                                    <p className="text-slate-500 mt-2 text-sm">Global monitoring of intellectual property and unauthorized broadcasts.</p>
                                </div>

                                <div className="grid grid-cols-4 gap-4 mb-10">
                                    {[
                                        { l: 'Blocked Streams', v: '1,248', c: '+12%', i: 'shield-off', clr: 'text-blue-500' },
                                        { l: 'Est. Revenue Saved', v: '$420.5k', c: '+8%', i: 'dollar-sign', clr: 'text-emerald-500' },
                                        { l: 'Active Assets', v: '8', c: '0%', i: 'lock', clr: 'text-slate-400' },
                                        { l: 'Detection Accuracy', v: '99.4%', c: '+0.2%', i: 'cpu', clr: 'text-blue-400' }
                                    ].map((stat, i) => (
                                        <div key={i} className="bg-[#0a0a1f] border border-slate-800 p-5 rounded-2xl shadow-sm">
                                            <div className="flex justify-between items-start mb-4">
                                                <i data-lucide={stat.i} className={`w-5 h-5 ${stat.clr}`}></i>
                                                <span className="text-[10px] font-black text-blue-400">{stat.c}</span>
                                            </div>
                                            <p className="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1">{stat.l}</p>
                                            <p className="text-2xl font-black text-white">{stat.v}</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-3 gap-8">
                                    <div className="col-span-2 bg-[#0a0a1f] border border-slate-800 p-8 rounded-3xl h-[400px]">
                                        <h4 className="text-xs font-bold text-white mb-8 uppercase tracking-widest">Global Piracy Index (24h)</h4>
                                        <div className="h-[280px]"><canvas id="mainAnalyticsChart"></canvas></div>
                                    </div>
                                    <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-3xl flex flex-col justify-between">
                                        <div>
                                            <h4 className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-6 text-white">Detection Engine</h4>
                                            <p className="text-5xl font-black text-white">94%</p>
                                            <p className="text-sm mt-4 text-white/80 leading-relaxed font-medium">Infrastructure optimization level reached across all nodes.</p>
                                        </div>
                                        <button className="w-full py-4 bg-white/10 hover:bg-white/20 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/20 transition-all text-white">View Engine Logs</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SCANNER TAB */}
                        {activeTab === 'Scanner' && (
                            <div className="max-w-4xl mx-auto animate-in fade-in duration-500">
                                <div className="mb-10 text-center">
                                    <h2 className="text-3xl font-extrabold text-white tracking-tight">Stream Scanner</h2>
                                    <p className="text-slate-500 mt-2 text-sm">Input any suspected URL or handle to verify piracy status against the Fingerprint Vault.</p>
                                </div>

                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-3xl p-12 mb-8 relative">
                                    <div className="flex gap-4">
                                        <input 
                                            type="text" 
                                            value={scanUrl}
                                            onChange={(e) => setScanUrl(e.target.value)}
                                            placeholder="Paste URL (e.g., youtube.com/live/match-hd)" 
                                            className="flex-1 bg-[#050510] border border-slate-800 rounded-2xl px-6 py-5 text-blue-400 font-mono text-sm focus:outline-none focus:border-blue-500 transition-all placeholder:text-slate-700"
                                        />
                                        <button 
                                            onClick={startScan}
                                            disabled={scanStatus === 'scanning'}
                                            className="bg-blue-600 hover:bg-blue-500 text-white font-black px-12 rounded-2xl text-xs uppercase tracking-widest flex items-center gap-3 transition-all active:scale-95 disabled:opacity-50"
                                        >
                                            {scanStatus === 'scanning' ? <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <i data-lucide="zap" className="w-4 h-4"></i>}
                                            {scanStatus === 'scanning' ? 'Scanning...' : 'Analyze'}
                                        </button>
                                    </div>
                                </div>

                                {scanStatus === 'scanning' && (
                                    <div className="bg-[#0a0a1f] border border-slate-800 rounded-3xl p-10 space-y-6 scanning-active">
                                        <div className="flex gap-5 items-center">
                                            <div className="w-10 h-10 rounded-full bg-blue-500/10 border border-blue-500/30 flex items-center justify-center"><i data-lucide="loader-2" className="w-5 h-5 text-blue-500 animate-spin"></i></div>
                                            <div>
                                                <p className="text-[12px] font-bold text-white uppercase tracking-widest">Resolving Meta-Data</p>
                                                <p className="text-[11px] text-slate-500">Checking protocol headers and server origin...</p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {scanStatus === 'result' && (
                                    <div className="bg-[#0a0a1f] border border-red-500/30 rounded-3xl p-10 animate-in slide-in-from-top-4 duration-500 shadow-2xl shadow-red-500/5">
                                        <div className="flex justify-between items-center mb-10 pb-8 border-b border-slate-800/50">
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Analysis Result for:</p>
                                                <p className="text-[13px] text-blue-400 font-mono font-bold tracking-tight">{scanUrl}</p>
                                            </div>
                                            <div className="px-4 py-2 bg-red-500/10 border border-red-500/30 rounded-xl">
                                                <span className="text-red-500 text-[10px] font-black uppercase tracking-[0.2em]">Malicious Signal Match</span>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-4 gap-6 mb-10">
                                            {[
                                                { l: 'Risk Score', v: '98/100', c: 'text-red-500' },
                                                { l: 'Asset Match', v: 'EPL Live Pack', c: 'text-white' },
                                                { l: 'Viewers', v: '18,402', c: 'text-white' },
                                                { l: 'Signature', v: 'SHA-256:F39D', c: 'text-white font-mono' }
                                            ].map((r, i) => (
                                                <div key={i} className="p-5 bg-[#050510] rounded-2xl border border-slate-800/50">
                                                    <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">{r.l}</p>
                                                    <p className={`text-sm font-black ${r.c}`}>{r.v}</p>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex gap-4">
                                            <button className="flex-1 py-4 bg-red-600 hover:bg-red-500 text-white font-black text-xs rounded-2xl uppercase tracking-widest transition-all">Send Takedown Notice</button>
                                            <button className="px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white font-black text-xs rounded-2xl uppercase tracking-widest transition-all">Geoblock Origin</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* PREDICTIONS TAB */}
                        {activeTab === 'Predictions' && (
                            <div className="animate-in fade-in duration-500">
                                <div className="mb-10">
                                    <h2 className="text-3xl font-extrabold text-white tracking-tight">Predictive Intelligence</h2>
                                    <p className="text-slate-500 mt-2 text-sm">AI-driven forecasts for potential piracy spikes based on major sporting calendars.</p>
                                </div>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-3xl overflow-hidden">
                                    <table className="w-full text-left text-[13px]">
                                        <thead className="bg-[#050510] text-slate-500 uppercase font-black text-[10px] border-b border-slate-800 tracking-widest">
                                            <tr>
                                                <th className="px-8 py-6">Target Event</th>
                                                <th className="px-8 py-6">Market</th>
                                                <th className="px-8 py-6">Piracy Forecast</th>
                                                <th className="px-8 py-6 text-right">Risk Level</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {[
                                                { m: 'Manchester United vs Liverpool', l: 'Premier League', p: '2.4M+ viewers', r: 'CRITICAL' },
                                                { m: 'Lakers vs Celtics', l: 'NBA Finals', p: '800k+ viewers', r: 'HIGH' },
                                                { m: 'India vs Pakistan — T20', l: 'ICC World Cup', p: '5.1M+ viewers', r: 'CRITICAL' },
                                                { m: 'Real Madrid vs Barcelona', l: 'La Liga', p: '1.9M+ viewers', r: 'CRITICAL' }
                                            ].map((ev, i) => (
                                                <tr key={i} className="hover:bg-slate-800/20 transition-all cursor-default">
                                                    <td className="px-8 py-6 font-bold text-white">{ev.m}</td>
                                                    <td className="px-8 py-6 text-slate-400 font-medium">{ev.l}</td>
                                                    <td className="px-8 py-6 text-blue-500 font-bold">{ev.p}</td>
                                                    <td className="px-8 py-6 text-right">
                                                        <span className={`px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest ${ev.r === 'CRITICAL' ? 'bg-red-500/10 text-red-500 border border-red-500/20' : 'bg-blue-500/10 text-blue-400 border border-blue-500/20'}`}>
                                                            {ev.r}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* APPS TAB */}
                        {activeTab === 'Apps' && (
                            <div className="animate-in fade-in duration-500">
                                <div className="mb-10">
                                    <h2 className="text-3xl font-extrabold text-white tracking-tight">Monitored Platforms</h2>
                                    <p className="text-slate-500 mt-2 text-sm">Real-time status of applications and surfaces under surveillance.</p>
                                </div>
                                <div className="grid grid-cols-3 gap-6">
                                    {[
                                        { name: 'TikTok Live', status: 'High Risk', count: '14 active', icon: 'video' },
                                        { name: 'Telegram Channels', status: 'Moderate', count: '42 active', icon: 'send' },
                                        { name: 'Illegal IPTV', status: 'Critical', count: '219 nodes', icon: 'tv' },
                                        { name: 'YouTube Gaming', status: 'Low Risk', count: '3 active', icon: 'youtube' },
                                        { name: 'Twitter Spaces', status: 'Moderate', count: '11 active', icon: 'twitter' },
                                        { name: 'Twitch', status: 'Moderate', count: '8 active', icon: 'twitch' }
                                    ].map((app, i) => (
                                        <div key={i} className="bg-[#0a0a1f] border border-slate-800 p-6 rounded-2xl hover:border-blue-500/30 transition-all group">
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="p-3 bg-blue-500/5 rounded-xl border border-blue-500/10 group-hover:bg-blue-600 group-hover:text-white transition-all"><i data-lucide={app.icon} className="w-5 h-5"></i></div>
                                                <span className={`text-[8px] font-black px-2 py-0.5 rounded uppercase ${app.status === 'Critical' || app.status === 'High Risk' ? 'text-red-500 bg-red-500/10' : 'text-blue-400 bg-blue-400/10'}`}>{app.status}</span>
                                            </div>
                                            <h4 className="text-white font-bold mb-1">{app.name}</h4>
                                            <p className="text-[11px] text-slate-500">{app.count} detected today</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* OTHER TABS FALLBACK */}
                        {!['Overview', 'Scanner', 'Apps', 'Predictions'].includes(activeTab) && (
                            <div className="flex flex-col items-center justify-center h-[60vh] opacity-30">
                                <i data-lucide="shield-alert" className="w-16 h-16 mb-6"></i>
                                <h3 className="text-2xl font-black uppercase tracking-tighter">{activeTab} Interface</h3>
                                <p className="text-sm mt-2">Data sync in progress for secure module.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
