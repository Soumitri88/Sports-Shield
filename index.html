<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#050510] text-slate-200 font-sans overflow-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const StatCard = ({ title, value, change, iconName, colorClass }) => (
            <div className="bg-[#0a0a1f] border border-slate-800 p-5 rounded-xl hover:border-blue-500 transition-all">
                <div className="flex justify-between items-start mb-4">
                    <div className={`p-2 rounded-lg bg-opacity-10 ${colorClass.bg}`}>
                        <i data-lucide={iconName} className={colorClass.text}></i>
                    </div>
                    <span className="text-xs font-medium text-blue-400">{change}</span>
                </div>
                <h3 className="text-slate-400 text-sm font-medium uppercase tracking-wider">{title}</h3>
                <p className="text-3xl font-bold mt-1 text-white">{value}</p>
            </div>
        );

        function App() {
            const [view, setView] = useState('Overview');

            useEffect(() => {
                // Initialize icons every time the view changes
                if (window.lucide) window.lucide.createIcons();
                
                if (view === 'Overview') {
                    const ctx = document.getElementById('piracyChart')?.getContext('2d');
                    if (ctx) {
                        new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: ['06:00', '09:00', '12:00', '15:00', '18:00', '21:00', '00:00'],
                                datasets: [{
                                    data: [65, 59, 80, 81, 56, 95, 130],
                                    borderColor: '#3b82f6',
                                    tension: 0.4,
                                    fill: true,
                                    backgroundColor: 'rgba(59, 130, 246, 0.1)'
                                }]
                            },
                            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
                        });
                    }
                }
            }, [view]);

            return (
                <div className="flex h-screen w-full">
                    {/* Sidebar */}
                    <aside className="w-64 bg-[#03030b] border-r border-slate-800 p-6 flex flex-col">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-blue-600 p-1.5 rounded-lg"><i data-lucide="shield" className="text-white"></i></div>
                            <h1 className="text-xl font-bold text-white">Sports Shield</h1>
                        </div>
                        <nav className="space-y-2">
                            {['Overview', 'Scanner', 'Tracking'].map((item) => (
                                <button key={item} onClick={() => setView(item)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm ${view === item ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <i data-lucide={item === 'Overview' ? 'layout' : item === 'Scanner' ? 'search' : 'target'} className="w-4 h-4"></i>
                                    {item}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 p-10 overflow-y-auto">
                        <header className="mb-10">
                            <h2 className="text-3xl font-bold text-white">{view} Control</h2>
                            <p className="text-slate-400">Real-time piracy intelligence and enforcement.</p>
                        </header>

                        {view === 'Overview' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <StatCard title="Active Incidents" value="11" change="+12%" iconName="activity" colorClass={{bg:'bg-blue-500', text:'text-blue-500'}} />
                                    <StatCard title="Viewers Blocked" value="285,400" change="+5%" iconName="eye-off" colorClass={{bg:'bg-cyan-500', text:'text-cyan-500'}} />
                                    <StatCard title="Takedowns" value="5" change="+2%" iconName="gavel" colorClass={{bg:'bg-purple-500', text:'text-purple-500'}} />
                                    <StatCard title="Revenue Saved" value="$4.82M" change="+18%" iconName="dollar-sign" colorClass={{bg:'bg-emerald-500', text:'text-emerald-500'}} />
                                </div>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-8 h-80">
                                    <canvas id="piracyChart"></canvas>
                                </div>
                            </div>
                        )}
                        
                        {view !== 'Overview' && (
                            <div className="flex flex-col items-center justify-center h-64 border-2 border-dashed border-slate-800 rounded-2xl text-slate-500">
                                <i data-lucide="refresh-cw" className="animate-spin mb-4"></i>
                                <p>Syncing {view} data from global nodes...</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
