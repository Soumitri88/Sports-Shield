<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Anti-Piracy Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050510; color: #cbd5e1; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #050510; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        @keyframes scan-move {
            0% { transform: translateY(-10px); }
            100% { transform: translateY(400px); }
        }
        .scanning-line { position: relative; overflow: hidden; }
        .scanning-line::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: #3b82f6; box-shadow: 0 0 15px #3b82f6;
            animation: scan-move 2s linear infinite;
        }
        .pulse-red { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="text-[13px] selection:bg-blue-500/30 overflow-hidden">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SidebarItem = ({ id, icon, label, active, onClick }) => (
            <button 
                onClick={() => onClick(id)}
                className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 group ${
                    active ? 'bg-blue-600/10 text-white border border-blue-500/20 shadow-[0_0_15px_rgba(59,130,246,0.1)]' : 'text-slate-500 hover:text-slate-200 hover:bg-slate-800/40'
                }`}
            >
                <i data-lucide={icon} className={`w-[18px] h-[18px] ${active ? 'text-blue-500' : 'group-hover:text-blue-400'}`}></i>
                <span className="font-semibold tracking-tight">{label}</span>
            </button>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('Overview');
            const [scanStatus, setScanStatus] = useState('idle'); 
            const [scanUrl, setScanUrl] = useState('youtube.com/live/match-hd-720p');
            const [scanStage, setScanStage] = useState(0);
            const [showReport, setShowReport] = useState(false);
            const chartInstances = useRef({});

            const stages = [
                { id: 1, label: "Resolving target endpoint", sub: "Endpoint resolved • 3 hops" },
                { id: 2, label: "Probing media stream signature", sub: "H.264 1080p • 60fps • 6 Mbps" },
                { id: 3, label: "Comparing against fingerprint vault", sub: "Match: UEFA Champions League Final" },
                { id: 4, label: "Geo-tagging viewer cluster", sub: "Cluster: South Asia • 47.2K concurrent" },
                { id: 5, label: "Computing risk score", sub: "Confidence 0.94" }
            ];

            useEffect(() => {
                window.lucide.createIcons();
                if (activeTab === 'Overview') renderOverviewChart();
            }, [activeTab, scanStatus, scanStage, showReport]);

            const renderOverviewChart = () => {
                const ctx = document.getElementById('trafficChart');
                if (ctx) {
                    if (chartInstances.current.main) chartInstances.current.main.destroy();
                    chartInstances.current.main = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['08:10', '10:10', '12:10', '14:10', '16:10', '18:10', '20:10', '22:10'],
                            datasets: [{
                                data: [120, 95, 70, 50, 45, 60, 40, 75],
                                borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.05)', fill: true, tension: 0.4, pointRadius: 0
                            }]
                        },
                        options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 10 } } }, y: { display: false } } }
                    });
                }
            };

            const startScan = () => {
                setScanStatus('scanning');
                setScanStage(0);
                stages.forEach((_, i) => {
                    setTimeout(() => setScanStage(i + 1), (i + 1) * 600);
                });
                setTimeout(() => setScanStatus('result'), stages.length * 700);
            };

            return (
                <div className="flex h-screen w-full bg-[#050510]">
                    {/* MODAL REPORT */}
                    {showReport && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-6 animate-in fade-in duration-300">
                            <div className="bg-[#0a0a1f] border border-blue-500/30 p-10 rounded-3xl max-w-lg w-full shadow-[0_0_50px_rgba(59,130,246,0.2)]">
                                <div className="flex justify-between items-start mb-8">
                                    <div><h3 className="text-xl font-black text-white uppercase tracking-tighter">AI Diagnostic Report</h3><p className="text-[10px] text-blue-500 font-bold uppercase mt-1">Status: Operational</p></div>
                                    <button onClick={() => setShowReport(false)} className="text-slate-500 hover:text-white transition-colors"><i data-lucide="x" className="w-5 h-5"></i></button>
                                </div>
                                <div className="space-y-4 font-mono text-[11px]">
                                    <div className="flex justify-between py-3 border-b border-slate-800/50"><span className="text-slate-500">Nodes</span><span className="text-white">Active (14)</span></div>
                                    <div className="flex justify-between py-3 border-b border-slate-800/50"><span className="text-slate-500">Neural Sync</span><span className="text-blue-400">8.4ms</span></div>
                                    <div className="flex justify-between py-3 border-b border-slate-800/50"><span className="text-slate-500">Accuracy</span><span className="text-blue-400">99.82%</span></div>
                                </div>
                                <button onClick={() => setShowReport(false)} className="w-full mt-10 py-4 bg-blue-600 text-white font-black rounded-xl text-[10px] uppercase tracking-widest">Close Diagnostic</button>
                            </div>
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <aside className="w-[240px] bg-[#03030b] border-r border-slate-800/60 p-5 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 text-blue-500 mb-10 px-2"><i data-lucide="shield" className="w-7 h-7 fill-blue-500/20"></i><h1 className="text-lg font-black text-white tracking-tighter uppercase">Sports Shield</h1></div>
                        <nav className="flex-1 space-y-1">
                            <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-600 px-3 mb-3 font-mono">Mission Center</p>
                            {[
                                { id: 'Overview', icon: 'activity' },
                                { id: 'Scanner', icon: 'search' },
                                { id: 'Apps', icon: 'layers' },
                                { id: 'Predictions', icon: 'trending-up' },
                                { id: 'Tracking', icon: 'map' },
                                { id: 'Assets', icon: 'lock' },
                                { id: 'Enforcement', icon: 'gavel' },
                                { id: 'Settings', icon: 'settings' }
                            ].map(item => (
                                <SidebarItem key={item.id} id={item.id} icon={item.icon} label={item.id} active={activeTab === item.id} onClick={setActiveTab} />
                            ))}
                        </nav>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-10">
                        
                        {/* 1. OVERVIEW (Unchanged) */}
                        {activeTab === 'Overview' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white tracking-tight">Operations Overview</h2>
                                <p className="text-slate-500 text-sm mt-1 mb-8">Real-time piracy intelligence and global enforcement metrics.</p>
                                <div className="grid grid-cols-6 gap-3 mb-8">
                                    {[
                                        { l: 'Active Incidents', v: '11', c: '+12%', i: 'activity', clr: 'text-red-500' },
                                        { l: 'Viewers Blocked', v: '285,400', c: '+5%', i: 'eye-off', clr: 'text-blue-400' },
                                        { l: 'Takedowns', v: '5', c: '+2%', i: 'gavel', clr: 'text-blue-500' },
                                        { l: 'Assets', v: '8', c: '0%', i: 'lock', clr: 'text-blue-600' },
                                        { l: 'Revenue', v: '$4.82M', c: '+18%', i: 'dollar-sign', clr: 'text-emerald-500' },
                                        { l: 'Avg Time', v: '47s', c: '-1s', i: 'clock', clr: 'text-orange-500' }
                                    ].map((s, idx) => (
                                        <div key={idx} className="bg-[#0a0a1f] border border-slate-800 p-4 rounded-xl">
                                            <div className="flex justify-between items-start mb-2"><i data-lucide={s.i} className={`w-3.5 h-3.5 ${s.clr}`}></i><span className="text-[9px] font-black text-blue-400">{s.c}</span></div>
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter mb-1">{s.l}</p>
                                            <p className="text-lg font-black text-white leading-none">{s.v}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-3 gap-6">
                                    <div className="col-span-2 bg-[#0a0a1f] border border-slate-800 p-6 rounded-2xl h-[300px]">
                                        <h4 className="text-xs font-bold text-white mb-6 uppercase tracking-widest">24h Traffic Impact</h4>
                                        <div className="h-[200px]"><canvas id="trafficChart"></canvas></div>
                                    </div>
                                    <div onClick={() => setShowReport(true)} className="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-2xl flex flex-col justify-between cursor-pointer hover:scale-[1.02] transition-all group relative overflow-hidden">
                                        <div><p className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-6">AI Efficiency</p><p className="text-5xl font-black text-white group-hover:drop-shadow-[0_0_15px_rgba(255,255,255,0.4)] transition-all">94%</p></div>
                                        <button className="w-full py-3 bg-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest border border-white/20">System Report</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 2. SCANNER (Unchanged) */}
                        {activeTab === 'Scanner' && (
                            <div className="max-w-4xl mx-auto animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white mb-8 tracking-tight">Stream Scanner</h2>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-10 mb-6 flex gap-3">
                                    <input type="text" value={scanUrl} onChange={(e)=>setScanUrl(e.target.value)} className="flex-1 bg-[#050510] border border-slate-800 rounded-xl px-5 py-4 text-blue-400 font-mono text-sm focus:outline-none" />
                                    <button onClick={startScan} className="bg-blue-600 hover:bg-blue-500 text-white font-black px-10 rounded-xl text-xs uppercase tracking-widest">Run Scan</button>
                                </div>
                                {scanStatus === 'scanning' && (
                                    <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl p-10 space-y-6 scanning-line">
                                        {stages.map((stage, idx) => (
                                            <div key={stage.id} className={`flex gap-4 items-start transition-all duration-500 ${scanStage > idx ? 'opacity-100' : 'opacity-20'}`}>
                                                <i data-lucide={scanStage > idx ? "check-circle" : "circle"} className={`w-4 h-4 mt-1 ${scanStage > idx ? 'text-blue-500' : 'text-slate-600'}`}></i>
                                                <div><p className="text-[13px] font-bold text-white">{stage.label}</p><p className="text-[11px] text-slate-500 font-mono">{stage.sub}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {scanStatus === 'result' && (
                                    <div className="bg-[#0a0a1f] border border-red-500/30 rounded-2xl p-10 animate-in zoom-in-95 duration-300">
                                        <p className="text-xs font-bold text-red-500 uppercase mb-4">Scan Result: Piracy Confirmed (Match 96%)</p>
                                        <button className="w-full py-4 bg-red-600 text-white font-black rounded-xl text-[10px] uppercase">Initiate Automated Takedown</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 3. APPS (New Full Implementation) */}
                        {activeTab === 'Apps' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white mb-8 tracking-tight">Monitored Platforms</h2>
                                <div className="grid grid-cols-3 gap-6">
                                    {[
                                        { name: 'Illegal IPTV', viewers: '419.4k', status: 'High Risk', icon: 'tv' },
                                        { name: 'Telegram Channels', viewers: '184.6k', status: 'Moderate', icon: 'send' },
                                        { name: 'TikTok Live', viewers: '94.4k', status: 'Emerging', icon: 'video' },
                                        { name: 'Twitter (X)', viewers: '79.0k', status: 'Low Risk', icon: 'twitter' },
                                        { name: 'Pirate Sites', viewers: '16.8k', status: 'Active', icon: 'globe' }
                                    ].map((app, i) => (
                                        <div key={i} className="bg-[#0a0a1f] border border-slate-800 p-6 rounded-2xl hover:border-blue-500/40 transition-all">
                                            <div className="flex justify-between items-center mb-6">
                                                <i data-lucide={app.icon} className="w-6 h-6 text-blue-500"></i>
                                                <span className="flex items-center gap-1 text-[8px] font-black text-red-500 uppercase bg-red-500/10 px-2 py-1 rounded-full"><span className="w-1 h-1 bg-red-500 rounded-full pulse-red"></span> Live</span>
                                            </div>
                                            <h4 className="text-white font-bold mb-1">{app.name}</h4>
                                            <p className="text-[10px] text-slate-500 font-bold uppercase mb-6 tracking-widest">{app.status}</p>
                                            <div className="bg-[#050510] p-4 rounded-xl border border-slate-800/50 flex justify-between">
                                                <span className="text-[9px] text-slate-500 font-bold uppercase">Live Viewers</span>
                                                <span className="text-white font-mono text-xs">{app.viewers}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 4. PREDICTIONS (New Full Implementation) */}
                        {activeTab === 'Predictions' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white mb-2 tracking-tight">Predictive Intelligence</h2>
                                <p className="text-slate-500 text-sm mb-8">AI-driven forecasts for upcoming high-risk broadcasting events.</p>
                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-2xl overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-[#050510] border-b border-slate-800 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                                            <tr><th className="p-6">Match / Event</th><th className="p-6">League</th><th className="p-6">Est. Piracy Viewers</th><th className="p-6 text-right">Risk Level</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/40 text-[12px]">
                                            {[
                                                { m: 'Manchester United vs Liverpool', l: 'Premier League', v: '1.2M+', r: 'CRITICAL' },
                                                { m: 'Real Madrid vs Barcelona', l: 'La Liga', v: '2.1M+', r: 'CRITICAL' },
                                                { m: 'Lakers vs Celtics', l: 'NBA', v: '640k+', r: 'HIGH' },
                                                { m: 'India vs Pakistan — T20', l: 'ICC World Cup', v: '4.5M+', r: 'CRITICAL' }
                                            ].map((ev, i) => (
                                                <tr key={i} className="hover:bg-slate-800/20">
                                                    <td className="p-6 font-bold text-white">{ev.m}</td>
                                                    <td className="p-6 text-slate-500">{ev.l}</td>
                                                    <td className="p-6 text-red-500 font-bold">{ev.v}</td>
                                                    <td className="p-6 text-right"><span className={`px-3 py-1 rounded-lg text-[9px] font-black ${ev.r==='CRITICAL' ? 'bg-red-500/10 text-red-500' : 'bg-orange-500/10 text-orange-500'}`}>{ev.r}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* 5. TRACKING (New Full Implementation) */}
                        {activeTab === 'Tracking' && (
                            <div className="animate-in fade-in duration-500">
                                <h2 className="text-2xl font-extrabold text-white mb-8 tracking-tight">Geospatial Tracking</h2>
                                <div className="grid grid-cols-4 gap-6">
                                    <div className="col-span-3 bg-[#0a0a1f] border border-slate-800 rounded-3xl p-6 h-[500px] relative overflow-hidden flex items-center justify-center">
                                        <div className="absolute inset-0 opacity-20 pointer-events-none">
                                            <div className="w-full h-full border border-blue-500/20 rounded-full animate-ping"></div>
                                        </div>
                                        <div className="text-center">
                                            <i data-lucide="map-pin" className="w-12 h-12 text-blue-500 mx-auto mb-4 pulse-red"></i>
                                            <p className="text-xs font-black uppercase text-slate-500 tracking-[0.3em]">Live Global Feed Active</p>
                                        </div>
                                        {/* Fake HUD Overlay */}
                                        <div className="absolute top-6 left-6 font-mono text-[9px] text-blue-400 space-y-1">
                                            <p>LAT: 28.6139° N</p><p>LONG: 77.2090° E</p>
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="bg-[#0a0a1f] border border-slate-800 p-6 rounded-2xl">
                                            <h4 className="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Active Hubs</h4>
                                            <div className="space-y-4">
                                                <div className="flex justify-between text-xs"><span className="text-white">South Asia</span><span className="text-red-500">47.2k</span></div>
                                                <div className="flex justify-between text-xs"><span className="text-white">W. Europe</span><span className="text-red-500">31.0k</span></div>
                                                <div className="flex justify-between text-xs"><span className="text-white">N. America</span><span className="text-blue-400">12.5k</span></div>
                                            </div>
                                        </div>
                                        <div className="bg-blue-600/10 border border-blue-500/20 p-6 rounded-2xl">
                                            <p className="text-[10px] font-black text-blue-500 uppercase mb-2">System Alert</p>
                                            <p className="text-xs text-white leading-relaxed font-medium">Anomaly detected in Madrid cluster. Stream relay identified.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* FALLBACK TABS (Assets, Enforcement, Settings) */}
                        {['Assets', 'Enforcement', 'Settings'].includes(activeTab) && (
                            <div className="flex flex-col items-center justify-center h-[60vh] opacity-20">
                                <i data-lucide="shield-off" className="w-16 h-16 mb-4"></i>
                                <h3 className="text-xl font-black uppercase tracking-widest">{activeTab} Secure Module</h3>
                                <p className="text-xs">Encryption Level: MIL-STD-2048</p>
                            </div>
                        )}

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
