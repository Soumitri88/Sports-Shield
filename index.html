<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Shield | Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#050510] text-slate-200 font-sans overflow-x-hidden text-xs">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // FIXED: StatCard component defined clearly
        const StatCard = ({ title, value, change, icon, color }) => (
            <div className="bg-[#0a0a1f] border border-slate-800 p-3 rounded-lg shadow-sm hover:border-blue-500 transition-all">
                <div className="flex justify-between items-start mb-2">
                    <div className={`p-1.5 rounded-md bg-opacity-10 ${color.bg}`}>
                        <i data-lucide={icon} className={`w-3.5 h-3.5 ${color.text}`}></i>
                    </div>
                    <span className="text-[9px] font-bold text-blue-400 uppercase">{change}</span>
                </div>
                <h3 className="text-slate-500 text-[10px] font-bold uppercase tracking-tighter">{title}</h3>
                <p className="text-xl font-bold text-white mt-0.5">{value}</p>
            </div>
        );

        function App() {
            const [view, setView] = useState('Overview');

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                
                if (view === 'Overview') {
                    // Traffic Chart
                    const trafficCtx = document.getElementById('trafficChart');
                    if (trafficCtx) {
                        new Chart(trafficCtx, {
                            type: 'line',
                            data: {
                                labels: ['07:14', '11:14', '15:14', '19:14', '23:14', '03:14', '05:14'],
                                datasets: [{
                                    data: [120, 90, 60, 50, 80, 110, 100],
                                    borderColor: '#3b82f6',
                                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                    fill: true, tension: 0.4, pointRadius: 0
                                }]
                            },
                            options: { 
                                maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 } } } }
                            }
                        });
                    }

                    // Regional Chart
                    const regionCtx = document.getElementById('regionChart');
                    if (regionCtx) {
                        new Chart(regionCtx, {
                            type: 'bar',
                            data: {
                                labels: ['Asia', 'EU', 'Global', 'ME', 'Africa'],
                                datasets: [{
                                    data: [240000, 120000, 70000, 65000, 40000],
                                    backgroundColor: '#3b82f6',
                                    borderRadius: 2,
                                    barThickness: 8
                                }]
                            },
                            options: {
                                indexAxis: 'y',
                                maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: { x: { display: false }, y: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 9 } } } }
                            }
                        });
                    }
                }
            }, [view]);

            return (
                <div className="flex h-screen w-full bg-[#050510]">
                    {/* FIXED: Sidebar map function logic */}
                    <aside className="w-52 bg-[#03030b] border-r border-slate-800 p-4 space-y-6">
                        <div className="flex items-center gap-2 text-blue-500 mb-6">
                            <i data-lucide="shield" className="w-6 h-6"></i>
                            <span className="text-lg font-bold text-white tracking-tight">Sports Shield</span>
                        </div>
                        <nav className="space-y-1">
                            {['Overview', 'Scanner', 'Apps', 'Tracking', 'Enforcement'].map((item) => (
                                <button 
                                    key={item} 
                                    onClick={() => setView(item)} 
                                    className={`w-full flex items-center gap-3 px-3 py-2 rounded-md text-[11px] font-medium transition ${view === item ? 'bg-blue-600/10 text-blue-400 border border-blue-600/20' : 'text-slate-500 hover:text-white hover:bg-slate-800'}`}
                                >
                                    <i data-lucide={item === 'Overview' ? 'layout-dashboard' : 'box'} className="w-3.5 h-3.5"></i>
                                    {item}
                                </button>
                            ))}
                        </nav>
                    </aside>

                    <main className="flex-1 overflow-y-auto p-6">
                        <header className="mb-6">
                            <h2 className="text-2xl font-bold text-white tracking-tight">{view} Overview</h2>
                            <p className="text-slate-500 text-[11px]">Real-time piracy intelligence and metrics.</p>
                        </header>

                        {view === 'Overview' ? (
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                                    <StatCard title="Active" value="11" change="+12%" icon="activity" color={{bg:'bg-red-500', text:'text-red-500'}} />
                                    <StatCard title="Blocked" value="285.4K" change="+5%" icon="eye-off" color={{bg:'bg-blue-500', text:'text-blue-500'}} />
                                    <StatCard title="Takedowns" value="5" change="+2%" icon="gavel" color={{bg:'bg-blue-400', text:'text-blue-400'}} />
                                    <StatCard title="Assets" value="8" change="0%" icon="lock" color={{bg:'bg-blue-600', text:'text-blue-600'}} />
                                    <StatCard title="Revenue" value="$4.82M" change="+18%" icon="dollar-sign" color={{bg:'bg-blue-500', text:'text-blue-500'}} />
                                    <StatCard title="Response" value="47s" change="-1s" icon="clock" color={{bg:'bg-yellow-500', text:'text-yellow-500'}} />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                                    <div className="lg:col-span-2 bg-[#0a0a1f] border border-slate-800 rounded-xl p-4">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">24h Piracy Traffic</h4>
                                        <div className="h-48"><canvas id="trafficChart"></canvas></div>
                                    </div>
                                    
                                    <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl p-4">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">High-Risk Upcoming</h4>
                                        <div className="space-y-2">
                                            {['Man Utd vs Liv', 'Real vs Barca', 'Lakers vs Celtics'].map(match => (
                                                <div key={match} className="p-2 bg-slate-900/50 rounded border border-slate-800 flex justify-between items-center">
                                                    <span className="text-[10px] text-white font-medium">{match}</span>
                                                    <span className="text-red-500 text-[8px] font-bold">CRITICAL</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#0a0a1f] border border-slate-800 rounded-xl p-4">
                                    <h4 className="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Regional Distribution</h4>
                                    <div className="h-40"><canvas id="regionChart"></canvas></div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center h-64 border-2 border-dashed border-slate-800 rounded-xl text-slate-600">
                                <i data-lucide="refresh-cw" className="w-6 h-6 animate-spin mb-2"></i>
                                <p>Syncing {view} module with Sports Shield AI...</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
